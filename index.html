<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>WordMaster Pro - 智能单词学习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            touch-action: manipulation; /* 优化触摸响应 */
        }
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; 
            background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        
        #app { 
            width: 100%; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden; 
            -webkit-overflow-scrolling: touch; 
            position: relative; 
            padding-bottom: 120px; 
            overscroll-behavior-y: contain; 
        }
        
        /* 键盘弹出时的适配 */
        .keyboard-open #app {
            padding-bottom: 20px;
        }
        .keyboard-open .bottom-nav {
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }
        .view { 
            display: none; 
            padding: 16px; 
            padding-bottom: 140px; 
            opacity: 0; 
            transform: translateY(10px); 
            transition: all 0.3s ease-out; 
            pointer-events: none; 
        }
        .view.active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: auto; 
        }
        
        /* 打字练习样式 - 优化点击区域 */
        .typing-container {
            position: relative;
            background: rgba(0,0,0,0.3); 
            border-radius: 20px; 
            padding: 24px 16px; 
            margin: 16px 0;
            border: 2px solid rgba(0,200,255,0.3);
            cursor: text; /* 提示可输入 */
            transition: all 0.2s;
            user-select: text; /* 允许选择 */
            -webkit-user-select: text;
        }
        .typing-container:active {
            border-color: rgba(0,200,255,0.6);
            background: rgba(0,0,0,0.4);
        }
        .typing-container.focused {
            border-color: #00a8ff;
            box-shadow: 0 0 0 3px rgba(0,168,255,0.2), inset 0 0 20px rgba(0,168,255,0.1);
        }
        
        /* 可见的输入框替代方案（解决iOS隐藏input不聚焦问题） */
        .typing-input-visible {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.001; /* 几乎透明但可交互 */
            z-index: 10;
            cursor: text;
            font-size: 16px; /* iOS缩放防止 */
            color: transparent;
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
        }
        
        .word-display { 
            display: flex; 
            justify-content: center; 
            gap: 6px; 
            margin-bottom: 16px; 
            flex-wrap: wrap;
            pointer-events: none; /* 让点击穿透到下方input */
            position: relative;
            z-index: 5;
        }
        .letter-box { 
            width: 40px; 
            height: 50px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: bold; 
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.15s;
            position: relative;
            pointer-events: none;
            user-select: none;
        }
        .letter-box.correct { 
            background: rgba(0,255,136,0.25); 
            border-color: #00ff88; 
            color: #00ff88;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
        .letter-box.wrong { 
            background: rgba(255,50,50,0.25); 
            border-color: #ff6464; 
            color: #ff6464;
            animation: shake 0.4s;
        }
        .letter-box.pending { 
            border-color: rgba(0,200,255,0.8);
            background: rgba(0,200,255,0.1);
        }
        .letter-box.cursor {
            box-shadow: 0 0 0 2px #00ffff, 0 0 15px rgba(0,255,255,0.4);
        }
        .letter-box.cursor::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background: #00ffff;
            border-radius: 2px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-4px); } 
            75% { transform: translateX(4px); } 
        }
        
        .typing-hint { 
            text-align: center; 
            color: rgba(255,255,255,0.5); 
            font-size: 13px; 
            margin-top: 12px;
            pointer-events: none;
            position: relative;
            z-index: 5;
        }
        .typing-hint.active {
            color: #00ffff;
            font-weight: 500;
        }
        
        .typing-stats { 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
            margin-top: 16px; 
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            pointer-events: none;
            position: relative;
            z-index: 5;
        }
        .stat-item { 
            display: flex; 
            align-items: center; 
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 12px;
        }
        
        /* 输入框样式统一优化 */
        .form-input { 
            width: 100%; 
            padding: 14px 16px; 
            background: rgba(0,0,0,0.3); 
            border: 2px solid rgba(0,200,255,0.2); 
            border-radius: 12px; 
            color: white; 
            font-size: 16px; /* 防止iOS缩放 */
            line-height: 1.5;
            -webkit-appearance: none;
            transition: all 0.2s;
            outline: none;
        }
        .form-input:focus { 
            border-color: #00a8ff; 
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 3px rgba(0,168,255,0.15);
        }
        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        /* 图片上传按钮 */
        .input-with-camera { 
            position: relative; 
            display: flex; 
            gap: 8px; 
            align-items: stretch; 
        }
        .camera-btn { 
            padding: 0 16px; 
            background: linear-gradient(135deg, #00a8ff, #0066ff); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 50px;
        }
        .camera-btn:active { 
            transform: scale(0.95); 
        }
        
        .inline-camera-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,200,255,0.2);
            border: 1px solid rgba(0,200,255,0.4);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            z-index: 10;
        }
        .inline-camera-btn:hover { 
            background: rgba(0,200,255,0.3); 
            transform: translateY(-50%) scale(1.05);
        }
        .inline-camera-btn:active { 
            transform: translateY(-50%) scale(0.95); 
        }
        
        /* OCR弹窗 */
        .ocr-modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 3000; 
            display: none; 
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .ocr-modal.active { 
            display: flex; 
            animation: fadeIn 0.3s; 
        }
        
        /* 图片选择浮层 */
        .image-picker { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(to top, #0a1628, #1a3a5c); 
            border-radius: 24px 24px 0 0; 
            padding: 24px; 
            z-index: 2500; 
            transform: translateY(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .image-picker.active { 
            transform: translateY(0); 
        }
        .picker-backdrop { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.7); 
            z-index: 2499; 
            display: none; 
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .picker-backdrop.active { 
            display: block; 
            opacity: 1; 
        }
        
        /* 底部导航 - 键盘适配 */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(10, 20, 35, 0.98); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); 
            z-index: 100; 
            transition: transform 0.3s;
        }
        
        /* 练习卡片 */
        .practice-card { 
            background: linear-gradient(145deg, rgba(0,200,255,0.1), rgba(0,100,255,0.1)); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 20px;
            border: 1px solid rgba(0,200,255,0.3);
        }
        
        /* 其他原有样式 */
        .lib-manager { 
            background: rgba(0,0,0,0.2); 
            border-radius: 20px; 
            padding: 16px; 
        }
        .lib-tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 16px; 
            overflow-x: auto; 
            scrollbar-width: none; 
        }
        .lib-tabs::-webkit-scrollbar { 
            display: none; 
        }
        .lib-tab { 
            padding: 8px 16px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            color: rgba(255,255,255,0.7); 
            font-size: 13px; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: all 0.2s; 
            flex-shrink: 0; 
            outline: none;
        }
        .lib-tab:focus {
            border-color: #00a8ff;
            color: #00ffff;
        }
        .lib-tab.active { 
            background: rgba(0,200,255,0.2); 
            border-color: rgba(0,200,255,0.5); 
            color: #00ffff; 
        }
        
        .word-list { 
            max-height: 50vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .btn-primary { 
            padding: 14px 24px; 
            background: linear-gradient(135deg, #00a8ff, #0066ff); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: 16px;
            min-height: 50px;
            outline: none;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:focus {
            box-shadow: 0 0 0 3px rgba(0,168,255,0.3);
        }
        .btn-primary:active:not(:disabled) { 
            transform: scale(0.98); 
        }
        .btn-primary:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        
        .nav-btn { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            padding: 8px 16px; 
            color: rgba(255,255,255,0.5); 
            font-size: 12px; 
            background: none; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s; 
            outline: none;
            border-radius: 12px;
        }
        .nav-btn:focus {
            color: #00ffff;
            background: rgba(0,200,255,0.1);
        }
        .nav-btn.active { 
            color: #00ffff; 
        }
        
        .toast { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-100px); 
            padding: 12px 24px; 
            border-radius: 24px; 
            font-size: 14px; 
            z-index: 4000; 
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            backdrop-filter: blur(10px); 
            opacity: 0; 
            pointer-events: none; 
            max-width: 80%; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }
        .toast.success { 
            background: rgba(0,255,136,0.95); 
            color: #000; 
        }
        .toast.error { 
            background: rgba(255,50,50,0.95); 
            color: white; 
        }
        
        /* 测试面板 */
        .test-toggle { 
            position: fixed; 
            top: 80px; 
            right: 20px; 
            z-index: 1000; 
            padding: 8px 16px; 
            background: rgba(0,255,0,0.2); 
            border: 1px solid #0f0; 
            color: #0f0; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold;
            outline: none;
        }
        .test-toggle:active {
            transform: scale(0.95);
        }
        
        /* 键盘测试反馈 */
        .input-test-result {
            margin-top: 8px;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            display: none;
        }
        .input-test-result.show {
            display: block;
        }
        .input-test-result.success {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.3);
        }
    </style>
</head>
<body>
    <!-- 图片选择浮层 -->
    <div class="picker-backdrop" id="pickerBackdrop" onclick="hideImagePicker()"></div>
    <div class="image-picker" id="imagePicker">
        <div style="width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px;"></div>
        <h3 style="margin: 0 0 16px 0; font-size: 16px; text-align: center;">选择图片</h3>
        <div class="picker-option" onclick="triggerCamera('camera')" style="display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s;">
            <div style="font-size: 24px; width: 40px; text-align: center;">📷</div>
            <div>
                <div style="font-weight: 500; margin-bottom: 2px;">拍照</div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5);">使用相机拍摄文字</div>
            </div>
        </div>
        <div class="picker-option" onclick="triggerCamera('album')" style="display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s;">
            <div style="font-size: 24px; width: 40px; text-align: center;">🖼️</div>
            <div>
                <div style="font-weight: 500; margin-bottom: 2px;">从相册选择</div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5);">选择已有图片</div>
            </div>
        </div>
        <button onclick="hideImagePicker()" style="width: 100%; padding: 14px; margin-top: 8px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; font-size: 15px; cursor: pointer;">取消</button>
    </div>

    <!-- OCR全屏处理弹窗 -->
    <div class="ocr-modal" id="ocrModal" onclick="if(event.target===this)closeOCRModal()">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
            <h3 style="margin: 0;">📷 图片识别</h3>
            <button onclick="closeOCRModal()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 8px;">&times;</button>
        </div>
        
        <div style="flex: 1; display: flex; align-items: center; justify-content: center; margin: 20px 0; border-radius: 16px; overflow: hidden; background: rgba(0,0,0,0.5); border: 2px dashed rgba(0,200,255,0.3);" id="ocrPreview">
            <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">
                <div style="font-size: 48px; margin-bottom: 12px;">🖼️</div>
                <p>正在加载...</p>
            </div>
        </div>
        
        <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 13px; color: rgba(255,255,255,0.6);" id="ocrStatus">准备识别...</span>
            <div style="display: flex; gap: 8px;">
                <button onclick="retryOCR()" id="retryBtn" style="display: none; padding: 8px 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 12px; cursor: pointer;">重试</button>
                <button onclick="confirmOCR()" id="confirmOCRBtn" style="display: none; padding: 8px 16px; background: linear-gradient(135deg, #00a8ff, #0066ff); border: none; border-radius: 8px; color: white; font-size: 12px; cursor: pointer; font-weight: bold;">使用结果</button>
            </div>
        </div>
        
        <div style="background: rgba(30,40,60,0.9); border-radius: 16px; padding: 16px; max-height: 40vh; overflow-y: auto; display: none;" id="ocrResultPanel">
            <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px;">识别到的文字（点击填入）：</div>
            <div id="ocrWordsList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            <div id="ocrFullText" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; color: rgba(255,255,255,0.7); font-family: monospace; max-height: 100px; overflow-y: auto; line-height: 1.6;"></div>
        </div>
    </div>

    <input type="file" id="hiddenFileInput" class="hidden" accept="image/*" onchange="handleImageSelected(this)">

    <div id="toast" class="toast"></div>
    
    <!-- 测试按钮 -->
    <button class="test-toggle" onclick="toggleTestPanel()" id="testBtn">🧪 测试</button>
    <div id="testPanel" style="position: fixed; top: 120px; right: 20px; background: rgba(0,0,0,0.95); border: 1px solid #0f0; border-radius: 12px; padding: 16px; z-index: 999; width: 280px; display: none; max-height: 60vh; overflow-y: auto;">
        <h3 style="margin: 0 0 12px 0; color: #0f0; font-size: 14px;">输入测试面板</h3>
        <button onclick="testTypingInput()" style="width: 100%; margin: 4px 0; padding: 8px; background: rgba(0,255,0,0.1); border: 1px solid #0f0; color: #0f0; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: left;">⌨️ 测试打字输入</button>
        <button onclick="testAllInputs()" style="width: 100%; margin: 4px 0; padding: 8px; background: rgba(0,255,0,0.1); border: 1px solid #0f0; color: #0f0; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: left;">📝 测试所有输入框</button>
        <button onclick="testKeyboardToggle()" style="width: 100%; margin: 4px 0; padding: 8px; background: rgba(0,255,0,0.1); border: 1px solid #0f0; color: #0f0; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: left;">📱 键盘唤起测试</button>
        <button onclick="clearTestLog()" style="width: 100%; margin: 4px 0; padding: 8px; color: #f00; border: 1px solid #f00; background: rgba(255,0,0,0.1); border-radius: 6px; cursor: pointer; font-size: 12px;">清除日志</button>
        <div id="testLog" style="margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.5); border-radius: 6px; font-size: 11px; font-family: monospace; max-height: 150px; overflow-y: auto; color: #0f0; line-height: 1.4;"></div>
        <div style="margin-top: 8px; font-size: 10px; color: #666;">点击外部关闭</div>
    </div>

    <div id="app">
        <!-- 学习视图（含打字练习） -->
        <div id="studyView" class="view active">
            <!-- 原有学习卡片 -->
            <div class="glass rounded-3xl p-5 mb-4">
                <div class="flex justify-center mb-4">
                    <span class="px-4 py-1.5 rounded-full bg-black/30 text-sm text-cyan-300 border border-cyan-500/30">
                        <span id="wordIndex">1</span> / <span id="totalCount">0</span>
                    </span>
                </div>
                
                <div class="text-center space-y-4 mb-6">
                    <div id="wordDisplay" class="text-3xl font-bold tracking-wider min-h-[40px]"></div>
                    <div id="definitionDisplay" class="text-lg text-cyan-200/70 min-h-[28px]"></div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="speakCurrent()" class="px-4 py-3 rounded-xl bg-cyan-500/20 text-cyan-400 border border-cyan-400/30 active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <span>🔊</span> 朗读
                    </button>
                    <button onclick="showHint()" class="px-4 py-3 rounded-xl bg-white/5 border border-white/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <span>💡</span> 提示
                    </button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="checkWord()" class="px-4 py-3 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-600 font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <span>✓</span> 已掌握
                    </button>
                    <button onclick="nextWord()" class="px-4 py-3 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <span>→</span> 下一个
                    </button>
                </div>
                
                <div id="feedback" class="h-8 text-center text-sm font-medium opacity-0 transition-opacity mt-4 flex items-center justify-center"></div>

    <script>
        // 测试面板控制
        function toggleTestPanel() {
            const panel = document.getElementById('testPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
        
        // 点击外部关闭测试面板
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('testPanel');
            const btn = document.getElementById('testBtn');
            if (panel.style.display === 'block' && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.style.display = 'none';
            }
        });

        function logTest(msg, type = 'info') {
            const log = document.getElementById('testLog');
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span style="color:#666">[${time}]</span> ${msg}`;
            div.style.color = type === 'error' ? '#f55' : (type === 'success' ? '#0f0' : '#fff');
            div.style.marginBottom = '3px';
            log.insertBefore(div, log.firstChild);
            while (log.children.length > 20) log.removeChild(log.lastChild);
        }

        function clearTestLog() {
            document.getElementById('testLog').innerHTML = '';
        }

        // 输入测试功能
        function testTypingInput() {
            logTest('开始测试打字输入...', 'info');
            const container = document.getElementById('typingContainer');
            const input = document.getElementById('typingInput');
            
            // 模拟点击
            container.click();
            
            setTimeout(() => {
                if (document.activeElement === input) {
                    logTest('✓ 打字区域点击后Input已聚焦', 'success');
                    showTestResult('typingTestResult', '键盘测试通过：点击可正常唤起键盘', true);
                } else {
                    logTest('✗ 打字区域点击后Input未聚焦', 'error');
                    showTestResult('typingTestResult', '键盘测试失败：点击未能聚焦', false);
                    // 强制聚焦
                    input.focus();
                }
            }, 100);
        }

        function testAllInputs() {
            logTest('测试所有输入框...', 'info');
            const inputs = [
                {id: 'inputWord', name: '英文输入'},
                {id: 'inputDef', name: '中文输入'},
                {id: 'batchInput', name: '批量导入'},
                {id: 'searchInput', name: '搜索框'}
            ];
            
            let current = 0;
            function testNext() {
                if (current >= inputs.length) {
                    logTest('全部输入框测试完成', 'success');
                    return;
                }
                const input = document.getElementById(inputs[current].id);
                if (input && !input.offsetParent) {
                    // 如果不在当前视图，跳过
                    current++;
                    testNext();
                    return;
                }
                
                input.focus();
                setTimeout(() => {
                    if (document.activeElement === input) {
                        logTest(`✓ ${inputs[current].name} 可聚焦`, 'success');
                    } else {
                        logTest(`✗ ${inputs[current].name} 聚焦失败`, 'error');
                    }
                    current++;
                    testNext();
                }, 50);
            }
            
            testNext();
        }

        function testKeyboardToggle() {
            logTest('测试键盘唤起/收起...', 'info');
            const input = document.getElementById('typingInput');
            
            // 聚焦
            input.focus();
            logTest('已触发focus，观察键盘是否弹出', 'info');
            
            setTimeout(() => {
                // 失焦
                input.blur();
                logTest('已触发blur，观察键盘是否收起', 'info');
            }, 2000);
        }

        function showTestResult(elementId, msg, success) {
            const el = document.getElementById(elementId);
            el.textContent = msg;
            el.className = 'input-test-result show ' + (success ? 'success' : 'error');
            setTimeout(() => {
                el.classList.remove('show');
            }, 3000);
        }

        // 输入框焦点提示
        function showInputFocus(type) {
            const hint = document.getElementById(type + 'FocusHint');
            if (hint) hint.style.opacity = '1';
            document.body.classList.add('keyboard-open');
        }

        function showInputBlur(type) {
            const hint = document.getElementById(type + 'FocusHint');
            if (hint) hint.style.opacity = '0';
            // 延迟检查是否有其他输入框聚焦
            setTimeout(() => {
                const active = document.activeElement;
                if (!active || !active.tagName === 'INPUT' && !active.tagName === 'TEXTAREA') {
                    document.body.classList.remove('keyboard-open');
                }
            }, 100);
        }

        // ==================== 数据管理层 ====================
        const Storage = {
            keys: {
                root: 'wm_lib_root',
                current: 'wm_current_lib',
                settings: 'wm_settings',
                stats: 'wm_stats',
                typing: 'wm_typing_stats'
            },
            get(key, defaultVal = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultVal;
                } catch(e) { return defaultVal; }
            },
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch(e) {
                    showToast('存储失败', 'error');
                    return false;
                }
            }
        };

        let state = {
            libraryRoot: null,
            currentLibId: 'default',
            settings: { autoTranslate: true, autoPlay: false },
            currentView: 'study',
            currentWordIndex: 0,
            stats: { mastered: 0, streak: 1, lastStudy: null },
            typing: {
                targetWord: '',
                currentInput: '',
                startTime: null,
                errors: 0,
                totalChars: 0,
                cursorPos: 0
            },
            ocr: { targetInput: null, lastResult: null },
            isProcessing: false
        };

        // LibraryAPI 实现...
        const LibraryAPI = {
            getRoot() { return Storage.get(Storage.keys.root, initDefaultData()); },
            saveRoot(root) { 
                const success = Storage.set(Storage.keys.root, root); 
                if (success) state.libraryRoot = root; 
                return success; 
            },
            findNode(id, node = null, path = []) {
                if (!node) node = this.getRoot();
                if (node.id === id) return {node, path};
                if (node.children) {
                    for (let child of node.children) {
                        const result = this.findNode(id, child, [...path, node]);
                        if (result) return result;
                    }
                }
                return null;
            },
            findLibrary(id) {
                const result = this.findNode(id);
                if (result && result.node.type === 'library') return result;
                return null;
            },
            getAllLibraries(node = null, list = [], path = '') {
                if (!node) node = this.getRoot();
                const currentPath = path ? `${path} > ${node.name}` : node.name;
                if (node.type === 'library') list.push({id: node.id, name: node.name, path: currentPath, count: node.words?.length || 0});
                if (node.children) node.children.forEach(child => this.getAllLibraries(child, list, currentPath));
                return list;
            },
            create(parentId, name, type = 'library') {
                const parent = this.findNode(parentId);
                if (!parent) throw new Error('父节点不存在');
                if (!parent.node.children) parent.node.children = [];
                if (!name?.trim()) throw new Error('名称不能为空');
                if (name.length > 50) throw new Error('名称过长');
                if (parent.node.children.some(c => c.name === name)) throw new Error('名称已存在');
                
                const newNode = {
                    id: `lib_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    name: name.trim(),
                    type: type,
                    created: Date.now(),
                    children: type === 'folder' ? [] : undefined,
                    words: type === 'library' ? [] : undefined
                };
                parent.node.children.push(newNode);
                this.saveRoot(state.libraryRoot);
                return newNode;
            },
            delete(id) {
                const root = this.getRoot();
                let deleted = false, deletedCurrent = false;
                const removeFromParent = (parent, targetId) => {
                    if (!parent.children) return false;
                    const idx = parent.children.findIndex(c => c.id === targetId);
                    if (idx >= 0) {
                        const toDelete = parent.children[idx];
                        const checkCurrent = (node) => { 
                            if (node.id === state.currentLibId) return true; 
                            if (node.children) return node.children.some(checkCurrent); 
                            return false; 
                        };
                        if (checkCurrent(toDelete)) deletedCurrent = true;
                        parent.children.splice(idx, 1);
                        deleted = true;
                        return true;
                    }
                    for (let child of parent.children) if (removeFromParent(child, targetId)) return true;
                    return false;
                };
                removeFromParent(root, id);
                if (deleted) {
                    this.saveRoot(root);
                    if (deletedCurrent) { state.currentLibId = 'default'; Storage.set(Storage.keys.current, 'default'); }
                }
                return {success: deleted, deletedCurrent};
            },
            rename(id, newName) {
                if (!newName?.trim()) throw new Error('名称不能为空');
                const target = this.findNode(id);
                if (!target) throw new Error('节点不存在');
                const parent = target.path[target.path.length - 1] || state.libraryRoot;
                if (parent.children?.some(c => c.id !== id && c.name === newName)) throw new Error('名称已存在');
                target.node.name = newName.trim();
                this.saveRoot(state.libraryRoot);
                return true;
            },
            addWord(libId, word, def) {
                const lib = this.findLibrary(libId);
                if (!lib) throw new Error('词库不存在');
                const w = word.trim().toLowerCase();
                if (!w) throw new Error('单词不能为空');
                if (w.length > 100) throw new Error('单词过长');
                if (lib.node.words.some(item => item.w === w)) throw new Error('单词已存在');
                
                const wordObj = { w: w, d: def?.trim() || '(未翻译)', ts: Date.now(), mastery: 0 };
                lib.node.words.push(wordObj);
                this.saveRoot(state.libraryRoot);
                if (state.currentLibId === libId) updateStudyView();
                return wordObj;
            },
            deleteWord(libId, wordText) {
                const lib = this.findLibrary(libId);
                if (!lib) return false;
                const idx = lib.node.words.findIndex(w => w.w === wordText);
                if (idx >= 0) {
                    lib.node.words.splice(idx, 1);
                    this.saveRoot(state.libraryRoot);
                    if (state.currentLibId === libId) {
                        if (state.currentWordIndex >= lib.node.words.length) state.currentWordIndex = Math.max(0, lib.node.words.length - 1);
                        updateStudyView();
                    }
                    return true;
                }
                return false;
            },
            editWord(libId, oldWord, newWord, newDef) {
                const lib = this.findLibrary(libId);
                if (!lib) return false;
                const item = lib.node.words.find(w => w.w === oldWord);
                if (!item) return false;
                const nw = newWord.trim().toLowerCase();
                if (!nw) throw new Error('单词不能为空');
                if (nw !== oldWord && lib.node.words.some(w => w.w === nw)) throw new Error('单词已存在');
                item.w = nw;
                item.d = newDef.trim();
                item.ts = Date.now();
                this.saveRoot(state.libraryRoot);
                if (state.currentLibId === libId) updateStudyView();
                return true;
            },
            clear(libId) {
                const lib = this.findLibrary(libId);
                if (!lib) return false;
                lib.node.words = [];
                this.saveRoot(state.libraryRoot);
                if (state.currentLibId === libId) { state.currentWordIndex = 0; updateStudyView(); }
                return true;
            },
            exportLib(libId) {
                const lib = this.findLibrary(libId);
                if (!lib) return null;
                return { name: lib.node.name, words: lib.node.words, exportTime: new Date().toISOString(), version: '1.0' };
            }
        };

        function initDefaultData() {
            return {
                id: 'root', name: '单词库', type: 'folder',
                children: [{
                    id: 'default', name: '默认词库', type: 'library',
                    words: [
                        {w: 'hello', d: '你好', ts: Date.now(), mastery: 0},
                        {w: 'world', d: '世界', ts: Date.now(), mastery: 0},
                        {w: 'study', d: '学习', ts: Date.now(), mastery: 0}
                    ],
                    created: Date.now()
                }]
            };
        }

        // ==================== 打字练习核心 ====================
        
        function initTypingPractice() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) {
                document.querySelector('.practice-card').style.display = 'none';
                return;
            }
            document.querySelector('.practice-card').style.display = 'block';
            
            const word = lib.node.words[state.currentWordIndex];
            if (!word) return;
            
            state.typing.targetWord = word.w.toLowerCase();
            state.typing.currentInput = '';
            state.typing.startTime = null;
            state.typing.errors = 0;
            state.typing.totalChars = 0;
            state.typing.cursorPos = 0;
            
            document.getElementById('practiceWord').textContent = word.w;
            document.getElementById('practiceMeaning').textContent = word.d || '(暂无释义)';
            
            // 重置输入框
            const input = document.getElementById('typingInput');
            input.value = '';
            
            renderLetterBoxes();
            updateTypingStats();
        }

        function renderLetterBoxes() {
            const container = document.getElementById('letterBoxes');
            const word = state.typing.targetWord;
            const input = state.typing.currentInput;
            
            container.innerHTML = word.split('').map((char, idx) => {
                let className = 'letter-box';
                let displayChar = '';
                
                if (idx < input.length) {
                    displayChar = input[idx];
                    className += input[idx] === char ? ' correct' : ' wrong';
                } else if (idx === input.length) {
                    className += ' pending cursor';
                }
                
                return `<div class="${className}" data-idx="${idx}">${displayChar}</div>`;
            }).join('');
        }

        // 关键修复：确保点击能聚焦输入框
        function focusTypingInput() {
            const input = document.getElementById('typingInput');
            const container = document.getElementById('typingContainer');
            
            // iOS需要这种双重聚焦技巧
            input.focus();
            input.click();
            
            // 添加视觉反馈
            container.classList.add('focused');
            
            // 光标定位到末尾
            const len = input.value.length;
            if (input.setSelectionRange) {
                input.setSelectionRange(len, len);
            }
            
            // 触发提示
            document.getElementById('typingHint').textContent = '⌨️ 请使用键盘输入字母';
            document.getElementById('typingHint').classList.add('active');
        }

        function onTypingFocus() {
            document.getElementById('typingContainer').classList.add('focused');
            document.body.classList.add('keyboard-open');
            document.getElementById('typingHint').textContent = '⌨️ 正在输入...';
            document.getElementById('typingHint').classList.add('active');
        }

        function onTypingBlur() {
            document.getElementById('typingContainer').classList.remove('focused');
            document.getElementById('typingHint').textContent = '👆 点击此处输入单词字母';
            document.getElementById('typingHint').classList.remove('active');
            
            // 延迟检查是否有其他输入框聚焦
            setTimeout(() => {
                const active = document.activeElement;
                if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA')) {
                    document.body.classList.remove('keyboard-open');
                }
            }, 100);
        }

        function handleTyping(e) {
            const input = e.target;
            let value = input.value.toLowerCase();
            const target = state.typing.targetWord;
            
            // 限制只能输入字母
            value = value.replace(/[^a-z]/g, '');
            
            // 长度限制
            if (value.length > target.length) {
                value = value.slice(0, target.length);
            }
            
            // 更新输入框（如果清理了字符）
            if (input.value !== value) {
                input.value = value;
            }
            
            state.typing.currentInput = value;
            
            // 首次输入开始计时
            if (!state.typing.startTime && value.length > 0) {
                state.typing.startTime = Date.now();
            }
            
            // 计算错误数（逐字母对比）
            let errors = 0;
            for (let i = 0; i < value.length; i++) {
                if (value[i] !== target[i]) errors++;
            }
            state.typing.errors = errors;
            state.typing.totalChars = value.length;
            
            renderLetterBoxes();
            updateTypingStats();
            
            // 检查完成
            if (value === target) {
                completeTyping();
            }
            
            // 触觉反馈
            if (navigator.vibrate && value.length > 0) {
                navigator.vibrate(3);
            }
        }

        function handleTypingKey(e) {
            // 防止退格导致页面后退
            if (e.key === 'Backspace') {
                // 允许正常的退格行为，不阻止
                return;
            }
            
            // Tab切换单词
            if (e.key === 'Tab') {
                e.preventDefault();
                nextWord();
                return;
            }
            
            // 回车完成
            if (e.key === 'Enter' && state.typing.currentInput === state.typing.targetWord) {
                e.preventDefault();
                completeTyping();
                return;
            }
        }

        function updateTypingStats() {
            const t = state.typing;
            if (!t.startTime || t.totalChars === 0) {
                updateAccuracyRing(0);
                document.getElementById('speedStat').textContent = '0 字/分';
                document.getElementById('accuracyStat').textContent = '准确率: 0%';
                document.getElementById('timeStat').textContent = '0s';
                return;
            }
            
            const elapsed = (Date.now() - t.startTime) / 1000;
            const minutes = elapsed / 60;
            const speed = minutes > 0 ? Math.round(t.totalChars / minutes) : 0;
            const accuracy = Math.max(0, Math.round((1 - (t.errors / t.totalChars)) * 100));
            
            document.getElementById('speedStat').textContent = speed + ' 字/分';
            document.getElementById('accuracyStat').textContent = '准确率: ' + accuracy + '%';
            document.getElementById('timeStat').textContent = Math.round(elapsed) + 's';
            
            updateAccuracyRing(accuracy);
        }

        function updateAccuracyRing(percent) {
            const circle = document.getElementById('accuracyCircle');
            const text = document.getElementById('accuracyText');
            const circumference = 2 * Math.PI * 26;
            
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            
            let color = '#ff6464';
            if (percent >= 80) color = '#00ff88';
            else if (percent >= 60) color = '#ffd700';
            text.style.color = color;
            text.textContent = percent + '%';
        }

        function completeTyping() {
            const time = Math.round((Date.now() - state.typing.startTime) / 1000);
            const accuracy = Math.max(0, Math.round((1 - (state.typing.errors / state.typing.totalChars)) * 100));
            
            showToast(`🎉 完成！用时${time}秒 准确率${accuracy}%`, 'success');
            
            // 保存统计
            const history = Storage.get(Storage.keys.typing, []);
            history.push({
                word: state.typing.targetWord,
                accuracy: accuracy,
                time: time,
                date: new Date().toISOString()
            });
            Storage.set(Storage.keys.typing, history.slice(-50));
            
            // 震动庆祝
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
            
            // 延迟后下一个
            setTimeout(() => {
                checkWord();
                resetTyping();
            }, 1200);
        }

        function resetTyping() {
            const input = document.getElementById('typingInput');
            input.value = '';
            state.typing.currentInput = '';
            state.typing.startTime = null;
            state.typing.errors = 0;
            state.typing.totalChars = 0;
            initTypingPractice();
            input.focus(); // 自动聚焦准备下一次输入
        }

        // ==================== OCR功能 ====================

        function showImagePicker(target) {
            state.ocr.targetInput = target;
            document.getElementById('pickerBackdrop').classList.add('active');
            document.getElementById('imagePicker').classList.add('active');
            
            // 如果键盘是打开的，先关闭
            if (document.activeElement) {
                document.activeElement.blur();
            }
        }

        function hideImagePicker() {
            document.getElementById('pickerBackdrop').classList.remove('active');
            document.getElementById('imagePicker').classList.remove('active');
        }

        function triggerCamera(type) {
            hideImagePicker();
            const input = document.getElementById('hiddenFileInput');
            input.value = '';
            
            if (type === 'camera' && navigator.userAgent.match(/iPhone|iPad|Android/i)) {
                input.setAttribute('capture', 'environment');
            } else {
                input.removeAttribute('capture');
            }
            
            setTimeout(() => input.click(), 100);
        }

        async function handleImageSelected(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast('图片过大（最大10MB）', 'error');
                return;
            }
            
            // 显示预览
            const url = URL.createObjectURL(file);
            document.getElementById('ocrPreview').innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px;">`;
            document.getElementById('ocrModal').classList.add('active');
            
            await performOCR(file);
        }

        async function performOCR(file) {
            const statusEl = document.getElementById('ocrStatus');
            const wordsList = document.getElementById('ocrWordsList');
            const resultPanel = document.getElementById('ocrResultPanel');
            const confirmBtn = document.getElementById('confirmOCRBtn');
            const retryBtn = document.getElementById('retryBtn');
            
            statusEl.textContent = '正在识别...';
            resultPanel.style.display = 'none';
            confirmBtn.style.display = 'none';
            retryBtn.style.display = 'none';
            
            try {
                const result = await Tesseract.recognize(file, 'eng+chi_sim', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            statusEl.textContent = `识别中... ${Math.round(m.progress * 100)}%`;
                        }
                    }
                });
                
                state.ocr.lastResult = result.data;
                statusEl.textContent = `完成 (置信度: ${Math.round(result.confidence)}%)`;
                
                // 提取单词
                const text = result.data.text;
                const engWords = [...new Set((text.match(/[a-zA-Z]{3,20}/g) || []))].slice(0, 20);
                const chinese = [...new Set((text.match(/[\u4e00-\u9fa5]{2,}/g) || []))].slice(0, 10);
                
                wordsList.innerHTML = '';
                
                if (engWords.length > 0) {
                    const section = document.createElement('div');
                    section.style.cssText = 'width: 100%; margin-bottom: 8px; font-size: 11px; color: rgba(255,255,255,0.5);';
                    section.textContent = '英文单词 (点击填入):';
                    wordsList.appendChild(section);
                    
                    engWords.forEach(word => {
                        const btn = document.createElement('button');
                        btn.style.cssText = 'padding: 6px 12px; border-radius: 20px; background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.4); color: #00ffff; font-size: 13px; cursor: pointer; margin: 0 4px 8px 0;';
                        btn.textContent = word;
                        btn.onclick = () => selectOCRWord(word);
                        wordsList.appendChild(btn);
                    });
                }
                
                if (chinese.length > 0) {
                    const section = document.createElement('div');
                    section.style.cssText = 'width: 100%; margin: 8px 0; font-size: 11px; color: rgba(255,255,255,0.5);';
                    section.textContent = '中文:';
                    wordsList.appendChild(section);
                    
                    chinese.forEach(text => {
                        const btn = document.createElement('button');
                        btn.style.cssText = 'padding: 6px 12px; border-radius: 20px; background: rgba(255,200,0,0.2); border: 1px solid rgba(255,200,0,0.4); color: #ffd700; font-size: 13px; cursor: pointer; margin: 0 4px 8px 0;';
                        btn.textContent = text;
                        btn.onclick = () => selectOCRDef(text);
                        wordsList.appendChild(btn);
                    });
                }
                
                document.getElementById('ocrFullText').textContent = text;
                resultPanel.style.display = 'block';
                confirmBtn.style.display = 'inline-block';
                
                // 自动处理
                if (state.ocr.targetInput === 'auto' && engWords.length > 0) {
                    await autoAddFromOCR(engWords[0], chinese[0] || '');
                }
                
            } catch(err) {
                statusEl.textContent = '识别失败';
                retryBtn.style.display = 'inline-block';
                showToast('识别失败', 'error');
            }
        }

        function selectOCRWord(word) {
            const target = state.ocr.targetInput;
            
            if (target === 'word' || target === 'quickadd') {
                document.getElementById('inputWord').value = word;
                closeOCRModal();
                setTimeout(() => document.getElementById('inputWord').focus(), 100);
            } else if (target === 'batch') {
                const textarea = document.getElementById('batchInput');
                textarea.value += (textarea.value ? '\n' : '') + word;
                showToast(`已添加 ${word}`, 'success');
            } else if (target === 'typing') {
                closeOCRModal();
                const lib = LibraryAPI.findLibrary(state.currentLibId);
                const exists = lib.node.words.find(w => w.w.toLowerCase() === word.toLowerCase());
                if (!exists) {
                    showConfirm(`"${word}" 不在当前词库，是否添加并开始练习？`, () => {
                        try {
                            LibraryAPI.addWord(state.currentLibId, word, '');
                            updateStudyView();
                            initTypingPractice();
                            // 找到新添加的单词并跳转
                            const idx = lib.node.words.findIndex(w => w.w.toLowerCase() === word.toLowerCase());
                            if (idx >= 0) {
                                state.currentWordIndex = idx;
                                updateStudyView();
                                initTypingPractice();
                            }
                            showToast(`开始练习: ${word}`, 'success');
                        } catch(e) {
                            showToast(e.message, 'error');
                        }
                    });
                } else {
                    const idx = lib.node.words.indexOf(exists);
                    state.currentWordIndex = idx;
                    updateStudyView();
                    initTypingPractice();
                    showToast(`切换到: ${word}`, 'success');
                }
            } else {
                document.getElementById('inputWord').value = word;
                closeOCRModal();
            }
        }

        function selectOCRDef(text) {
            const target = state.ocr.targetInput;
            if (target === 'def') {
                document.getElementById('inputDef').value = text;
                closeOCRModal();
                setTimeout(() => document.getElementById('inputDef').focus(), 100);
            } else if (target === 'batch') {
                const textarea = document.getElementById('batchInput');
                const lines = textarea.value.split('\n');
                if (lines.length > 0 && lines[lines.length - 1].trim()) {
                    lines[lines.length - 1] += ' ' + text;
                    textarea.value = lines.join('\n');
                } else {
                    textarea.value += text;
                }
                showToast('已添加释义', 'success');
            }
        }

        async function autoAddFromOCR(word, def) {
            try {
                LibraryAPI.addWord(state.currentLibId, word, def);
                showToast(`已添加: ${word}`, 'success');
                closeOCRModal();
                updateCurrentLibDisplay();
                renderWordList();
                if (state.currentView === 'study') updateStudyView();
            } catch(e) {
                showToast(e.message, 'error');
            }
        }

        function closeOCRModal() {
            document.getElementById('ocrModal').classList.remove('active');
        }

        function retryOCR() {
            const input = document.getElementById('hiddenFileInput');
            if (input.files[0]) performOCR(input.files[0]);
        }

        function confirmOCR() {
            closeOCRModal();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById('batchInput').value += (document.getElementById('batchInput').value ? '\n' : '') + text;
                    showToast('已粘贴', 'success');
                }
            } catch(e) {
                showToast('无法访问剪贴板', 'error');
            }
        }

        // ==================== 原有功能函数 ====================

        function init() {
            state.libraryRoot = LibraryAPI.getRoot();
            state.currentLibId = Storage.get(Storage.keys.current, 'default');
            state.settings = Storage.get(Storage.keys.settings, {autoTranslate: true, autoPlay: false});
            state.stats = Storage.get(Storage.keys.stats, {mastered: 0, streak: 1, lastStudy: null});
            
            if (!LibraryAPI.findLibrary(state.currentLibId)) {
                state.currentLibId = 'default';
                Storage.set(Storage.keys.current, 'default');
            }
            
            bindEvents();
            updateStudyView();
            initTypingPractice();
            renderWordList();
            updateCurrentLibDisplay();
        }

        function bindEvents() {
            // 全局键盘监听
            document.addEventListener('keydown', (e) => {
                if (state.currentView === 'library') {
                    if (e.key === 'Enter' && document.activeElement.id === 'inputWord') {
                        e.preventDefault();
                        if (state.settings.autoTranslate) {
                            autoTranslateAdd().then(() => addWordFromLib());
                        } else {
                            document.getElementById('inputDef').focus();
                        }
                    }
                    if (e.key === 'Enter' && document.activeElement.id === 'inputDef') {
                        e.preventDefault();
                        addWordFromLib();
                    }
                    if (e.key === 'Enter' && e.ctrlKey && document.activeElement.id === 'batchInput') {
                        e.preventDefault();
                        addBatchWords();
                    }
                }
                
                // 打字练习的退格键特殊处理（防止页面后退）
                if (e.key === 'Backspace' && document.activeElement.id === 'typingInput') {
                    // 不阻止，让input正常处理
                    if (document.activeElement.value === '') {
                        e.preventDefault(); // 只有空时阻止页面后退
                    }
                }
            });

            // 搜索框
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => renderWordList(e.target.value), 150);
            });

            // 点击外部关闭
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#imagePicker') && !e.target.closest('.picker-backdrop')) {
                    hideImagePicker();
                }
            });
            
            // 监听键盘弹出（resize事件）
            let windowHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                const newHeight = window.innerHeight;
                if (newHeight < windowHeight * 0.8) {
                    // 键盘可能弹出了
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                }
                windowHeight = newHeight;
            });
        }

        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(viewName + 'View')?.classList.add('active');
            document.querySelector(`.nav-btn[data-view="${viewName}"]`)?.classList.add('active');
            state.currentView = viewName;
            
            if (viewName === 'study') {
                updateStudyView();
                initTypingPractice();
            } else if (viewName === 'library') {
                renderWordList();
                updateCurrentLibDisplay();
            }
        }

        function switchLibTab(tabName) {
            document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.lib-tab[data-tab="${tabName}"]`)?.classList.add('active');
            document.querySelectorAll('.lib-tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('tab-' + tabName).style.display = 'block';
            
            if (tabName === 'words') renderWordList();
            else if (tabName === 'add') setTimeout(() => document.getElementById('inputWord').focus(), 100);
        }

        function updateStudyView() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            const wd = document.getElementById('wordDisplay');
            const dd = document.getElementById('definitionDisplay');
            const wi = document.getElementById('wordIndex');
            const tc = document.getElementById('totalCount');
            
            if (!lib?.node.words?.length) {
                wd.textContent = '📚';
                dd.textContent = '当前词库为空';
                wi.textContent = '0';
                tc.textContent = '0';
                return;
            }
            
            if (state.currentWordIndex >= lib.node.words.length) state.currentWordIndex = 0;
            
            const word = lib.node.words[state.currentWordIndex];
            wd.textContent = word.w;
            dd.textContent = word.d || '';
            wi.textContent = (state.currentWordIndex + 1).toString();
            tc.textContent = lib.node.words.length.toString();
        }

        function nextWord() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) { showToast('词库为空', 'warning'); return; }
            state.currentWordIndex = (state.currentWordIndex + 1) % lib.node.words.length;
            updateStudyView();
            initTypingPractice();
            hideFeedback();
        }

        function checkWord() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) return;
            const word = lib.node.words[state.currentWordIndex];
            word.mastery = (word.mastery || 0) + 1;
            LibraryAPI.saveRoot(state.libraryRoot);
            showFeedback('✓ 已掌握！', 'success');
        }

        function showHint() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) return;
            const word = lib.node.words[state.currentWordIndex];
            showFeedback(`提示：首字母 ${word.w[0].toUpperCase()}`, 'info');
        }

        function showFeedback(text, type) {
            const fb = document.getElementById('feedback');
            fb.textContent = text;
            fb.style.opacity = '1';
            fb.className = `h-8 text-center text-sm font-medium transition-opacity flex items-center justify-center ${type === 'success' ? 'text-emerald-400' : 'text-cyan-400'}`;
            clearTimeout(window.feedbackTimer);
            window.feedbackTimer = setTimeout(() => fb.style.opacity = '0', 2000);
        }

        function hideFeedback() {
            document.getElementById('feedback').style.opacity = '0';
        }

        function speakCurrent() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) return;
            const word = lib.node.words[state.currentWordIndex];
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(word.w);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
            }
        }

        // 词库管理函数...
        function renderWordList(filterText = '') {
            const container = document.getElementById('wordListContainer');
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            
            if (!lib?.node.words?.length) {
                container.innerHTML = '<div style="text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.4);"><div style="font-size: 48px; margin-bottom: 12px; opacity: 0.6;">📚</div><p>暂无单词</p></div>';
                return;
            }
            
            let words = [...lib.node.words];
            if (filterText) {
                const lower = filterText.toLowerCase();
                words = words.filter(w => w.w?.toLowerCase().includes(lower) || w.d?.includes(lower));
            }
            words.sort((a, b) => (b.ts || 0) - (a.ts || 0));
            
            container.innerHTML = words.map(w => `
                <div style="display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px;">
                    <div style="flex: 1;">
                        <div style="font-weight: bold; color: #00ffff; font-size: 16px;">${w.w}</div>
                        <div style="color: rgba(255,255,255,0.6); font-size: 13px;">${w.d || ''}</div>
                    </div>
                    <button onclick="editWord('${w.w}')" style="padding: 6px 12px; margin-right: 8px; border-radius: 8px; background: rgba(0,200,255,0.2); border: none; color: #00ffff; font-size: 12px; cursor: pointer;">编辑</button>
                    <button onclick="deleteWord('${w.w}')" style="padding: 6px 12px; border-radius: 8px; background: rgba(255,50,50,0.2); border: none; color: #ff6464; font-size: 12px; cursor: pointer;">删除</button>
                </div>
            `).join('');
        }

        async function addWordFromLib() {
            if (state.isProcessing) return;
            const wi = document.getElementById('inputWord');
            const di = document.getElementById('inputDef');
            const btn = document.getElementById('addWordBtn');
            
            const word = wi.value.trim();
            const def = di.value.trim();
            
            if (!word) { showToast('请输入英文单词', 'error'); wi.focus(); return; }
            
            state.isProcessing = true;
            btn.disabled = true;
            
            try {
                let finalDef = def;
                if (!finalDef && state.settings.autoTranslate) {
                    showToast('翻译中...', 'info');
                    finalDef = await translateWord(word);
                }
                LibraryAPI.addWord(state.currentLibId, word, finalDef);
                showToast('添加成功: ' + word, 'success');
                wi.value = '';
                di.value = '';
                renderWordList();
                updateCurrentLibDisplay();
                wi.focus();
            } catch(e) {
                showToast(e.message, 'error');
            } finally {
                state.isProcessing = false;
                btn.disabled = false;
            }
        }

        async function autoTranslateAdd() {
            const wi = document.getElementById('inputWord');
            const di = document.getElementById('inputDef');
            const word = wi.value.trim();
            if (!word) { showToast('请先输入英文', 'error'); return; }
            
            showToast('翻译中...', 'info');
            const trans = await translateWord(word);
            if (trans) {
                di.value = trans;
                showToast('翻译完成', 'success');
                di.focus();
            } else {
                showToast('翻译失败', 'warning');
            }
        }

        async function addBatchWords() {
            const bi = document.getElementById('batchInput');
            const text = bi.value.trim();
            if (!text) { showToast('请输入内容', 'error'); return; }
            
            const lines = text.split('\n').filter(l => l.trim());
            let added = 0, skipped = 0;
            
            for (let line of lines) {
                const parts = line.trim().split(/\s+/);
                const word = parts[0];
                const def = parts.slice(1).join(' ');
                try {
                    LibraryAPI.addWord(state.currentLibId, word, def);
                    added++;
                } catch(e) { if (e.message.includes('已存在')) skipped++; }
            }
            
            showToast(`成功${added}，跳过${skipped}`, added > 0 ? 'success' : 'warning');
            if (added > 0) {
                bi.value = '';
                renderWordList();
                updateCurrentLibDisplay();
                switchLibTab('words');
            }
        }

        async function autoTranslateBatch() {
            const bi = document.getElementById('batchInput');
            const lines = bi.value.trim().split('\n');
            if (!lines.length) return;
            
            showToast('批量翻译中...', 'info');
            const result = [];
            for (let line of lines) {
                const parts = line.trim().split(/\s+/);
                const word = parts[0];
                let def = parts.slice(1).join(' ');
                if (word && !def) {
                    def = await translateWord(word) || '(失败)';
                    await new Promise(r => setTimeout(r, 200));
                }
                result.push(`${word} ${def}`);
            }
            bi.value = result.join('\n');
            showToast('翻译完成', 'success');
        }

        function deleteWord(wordText) {
            if (!confirm(`删除 "${wordText}"？`)) return;
            if (LibraryAPI.deleteWord(state.currentLibId, wordText)) {
                showToast('已删除', 'success');
                renderWordList();
                updateCurrentLibDisplay();
            }
        }

        function editWord(wordText) {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            const word = lib.node.words.find(w => w.w === wordText);
            if (!word) return;
            const newWord = prompt('修改单词：', word.w);
            if (newWord === null) return;
            const newDef = prompt('修改释义：', word.d);
            if (newDef === null) return;
            try {
                LibraryAPI.editWord(state.currentLibId, wordText, newWord || word.w, newDef);
                showToast('修改成功', 'success');
                renderWordList();
                updateStudyView();
            } catch(e) { showToast(e.message, 'error'); }
        }

        function showLibSelector() {
            const sel = document.getElementById('libSelector');
            const list = document.getElementById('libTreeList');
            const libs = LibraryAPI.getAllLibraries();
            
            list.innerHTML = libs.map(lib => `
                <div onclick="selectLibrary('${lib.id}')" style="display: flex; align-items: center; padding: 12px; margin-bottom: 6px; border-radius: 10px; cursor: pointer; transition: all 0.2s; ${lib.id === state.currentLibId ? 'background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.4);' : 'background: rgba(255,255,255,0.05);'}">
                    <div style="width: 32px; text-align: center; margin-right: 12px; font-size: 18px;">${lib.id === state.currentLibId ? '✓' : '📚'}</div>
                    <div style="flex: 1; font-weight: 500;">${lib.path}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.5);">${lib.count}词</div>
                </div>
            `).join('');
            
            sel.classList.remove('hidden');
            setTimeout(() => {
                sel.classList.remove('opacity-0');
                document.getElementById('libSelectorBox').classList.remove('scale-95');
                document.getElementById('libSelectorBox').classList.add('scale-100');
            }, 10);
        }

        function hideLibSelector() {
            const sel = document.getElementById('libSelector');
            sel.classList.add('opacity-0');
            document.getElementById('libSelectorBox').classList.remove('scale-100');
            document.getElementById('libSelectorBox').classList.add('scale-95');
            setTimeout(() => sel.classList.add('hidden'), 300);
        }

        function selectLibrary(id) {
            state.currentLibId = id;
            Storage.set(Storage.keys.current, id);
            hideLibSelector();
            updateCurrentLibDisplay();
            renderWordList();
            updateStudyView();
            initTypingPractice();
            showToast('已切换词库', 'success');
        }

        function createNewLibrary() {
            const name = prompt('新词库名称：');
            if (!name?.trim()) return;
            try {
                const newLib = LibraryAPI.create('root', name.trim(), 'library');
                showToast('创建成功', 'success');
                if (confirm('切换到新词库？')) selectLibrary(newLib.id);
            } catch(e) { showToast(e.message, 'error'); }
        }

        function renameCurrentLibrary() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib) return;
            const name = prompt('新名称：', lib.node.name);
            if (!name?.trim()) return;
            try {
                LibraryAPI.rename(state.currentLibId, name.trim());
                updateCurrentLibDisplay();
                showToast('重命名成功', 'success');
            } catch(e) { showToast(e.message, 'error'); }
        }

        function clearCurrentLibrary() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) { showToast('词库已是空的', 'info'); return; }
            if (!confirm(`清空 ${lib.node.words.length} 个单词？`)) return;
            if (LibraryAPI.clear(state.currentLibId)) {
                showToast('已清空', 'success');
                renderWordList();
                updateCurrentLibDisplay();
                updateStudyView();
            }
        }

        function deleteCurrentLibrary() {
            if (state.currentLibId === 'default') { showToast('不能删除默认词库', 'error'); return; }
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib) return;
            if (!confirm(`删除 "${lib.node.name}"？`)) return;
            const result = LibraryAPI.delete(state.currentLibId);
            if (result.success) {
                showToast('已删除', 'success');
                if (result.deletedCurrent) selectLibrary('default');
            }
        }

        function exportCurrentLibrary() {
            const data = LibraryAPI.exportLib(state.currentLibId);
            if (!data) { showToast('导出失败', 'error'); return; }
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${data.name}_export_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('导出成功', 'success');
        }

        function updateCurrentLibDisplay() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (lib?.node) {
                document.getElementById('currentLibName').textContent = lib.node.name;
                document.getElementById('currentLibCount').textContent = (lib.node.words?.length || 0) + '词';
            }
        }

        const translationCache = {};
        async function translateWord(text) {
            if (!text) return '';
            if (translationCache[text]) return translationCache[text];
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh`);
                const data = await res.json();
                const result = data.responseData?.translatedText;
                if (result && result !== text) {
                    translationCache[text] = result;
                    return result;
                }
                return '';
            } catch(e) { return ''; }
        }

        function showToast(msg, type = 'info', duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type}`;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        function showConfirm(text, onConfirm) {
            if (confirm(text)) onConfirm();
        }

        // 启动
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
