<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>WordMaster Pro - 智能单词学习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; 
            background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        
        #app { 
            width: 100%; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden; 
            -webkit-overflow-scrolling: touch; 
            position: relative; 
            padding-bottom: 120px; 
            overscroll-behavior-y: contain;
        }
        
        .keyboard-open #app {
            padding-bottom: 20px;
        }
        .keyboard-open .bottom-nav {
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }
        .view { 
            display: none; 
            padding: 16px; 
            padding-bottom: 140px; 
            opacity: 0; 
            transform: translateY(10px); 
            transition: all 0.3s ease-out; 
            pointer-events: none;
            min-height: 100%;
        }
        .view.active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: auto;
        }
        
        /* 打字练习样式 */
        .typing-container {
            position: relative;
            background: rgba(0,0,0,0.3); 
            border-radius: 20px; 
            padding: 24px 16px; 
            margin: 16px 0;
            border: 2px solid rgba(0,200,255,0.3);
            cursor: text;
            transition: all 0.2s;
            touch-action: pan-y;
            -webkit-user-select: none;
            user-select: none;
        }
        .typing-container:active {
            border-color: rgba(0,200,255,0.6);
            background: rgba(0,0,0,0.4);
        }
        .typing-container.focused {
            border-color: #00a8ff;
            box-shadow: 0 0 0 3px rgba(0,168,255,0.2), inset 0 0 20px rgba(0,168,255,0.1);
        }
        
        .typing-input-visible {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.001;
            z-index: 10;
            cursor: text;
            font-size: 16px;
            color: transparent;
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            touch-action: auto;
            pointer-events: auto;
        }
        
        .word-display { 
            display: flex; 
            justify-content: center; 
            gap: 6px; 
            margin-bottom: 16px; 
            flex-wrap: wrap;
            pointer-events: none;
            position: relative;
            z-index: 5;
            -webkit-user-select: text;
            user-select: text;
        }
        .letter-box { 
            width: 40px; 
            height: 50px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: bold; 
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.15s;
            position: relative;
            pointer-events: auto;
            -webkit-user-select: none;
            user-select: none;
        }
        .letter-box.correct { 
            background: rgba(0,255,136,0.25); 
            border-color: #00ff88; 
            color: #00ff88;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
        .letter-box.wrong { 
            background: rgba(255,50,50,0.25); 
            border-color: #ff6464; 
            color: #ff6464;
            animation: shake 0.4s;
        }
        .letter-box.pending { 
            border-color: rgba(0,200,255,0.8);
            background: rgba(0,200,255,0.1);
        }
        .letter-box.cursor {
            box-shadow: 0 0 0 2px #00ffff, 0 0 15px rgba(0,255,255,0.4);
        }
        .letter-box.cursor::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background: #00ffff;
            border-radius: 2px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-4px); } 
            75% { transform: translateX(4px); } 
        }
        
        .typing-hint { 
            text-align: center; 
            color: rgba(255,255,255,0.5); 
            font-size: 13px; 
            margin-top: 12px;
            pointer-events: none;
            position: relative;
            z-index: 5;
        }
        .typing-hint.active {
            color: #00ffff;
            font-weight: 500;
        }
        
        .typing-stats { 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
            margin-top: 16px; 
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            pointer-events: none;
            position: relative;
            z-index: 5;
        }
        .stat-item { 
            display: flex; 
            align-items: center; 
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 12px;
        }
        
        .form-input { 
            width: 100%; 
            padding: 14px 16px; 
            background: rgba(0,0,0,0.3); 
            border: 2px solid rgba(0,200,255,0.2); 
            border-radius: 12px; 
            color: white; 
            font-size: 16px;
            line-height: 1.5;
            -webkit-appearance: none;
            transition: all 0.2s;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }
        .form-input:focus { 
            border-color: #00a8ff; 
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 3px rgba(0,168,255,0.15);
        }
        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .input-with-camera { 
            position: relative; 
            display: flex; 
            gap: 8px; 
            align-items: stretch; 
        }
        .camera-btn { 
            padding: 0 16px; 
            background: linear-gradient(135deg, #00a8ff, #0066ff); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 50px;
            touch-action: manipulation;
        }
        .camera-btn:active { 
            transform: scale(0.95); 
        }
        .camera-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .inline-camera-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,200,255,0.2);
            border: 1px solid rgba(0,200,255,0.4);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            z-index: 10;
            touch-action: manipulation;
        }
        .inline-camera-btn:hover { 
            background: rgba(0,200,255,0.3); 
            transform: translateY(-50%) scale(1.05);
        }
        .inline-camera-btn:active { 
            transform: translateY(-50%) scale(0.95); 
        }
        
        .ocr-modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 3000; 
            display: none; 
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            touch-action: none;
        }
        .ocr-modal.active { 
            display: flex; 
            animation: fadeIn 0.3s; 
        }
        
        .image-picker { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(to top, #0a1628, #1a3a5c); 
            border-radius: 24px 24px 0 0; 
            padding: 24px; 
            z-index: 2500; 
            transform: translateY(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid rgba(255,255,255,0.1);
            touch-action: pan-y;
        }
        .image-picker.active { 
            transform: translateY(0); 
        }
        .picker-backdrop { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.7); 
            z-index: 2499; 
            display: none; 
            opacity: 0; 
            transition: opacity 0.3s;
            touch-action: none;
        }
        .picker-backdrop.active { 
            display: block; 
            opacity: 1; 
        }
        
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(10, 20, 35, 0.98); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); 
            z-index: 100; 
            transition: transform 0.3s;
            touch-action: pan-x;
        }
        
        .practice-card { 
            background: linear-gradient(145deg, rgba(0,200,255,0.1), rgba(0,100,255,0.1)); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 20px;
            border: 1px solid rgba(0,200,255,0.3);
            touch-action: pan-y;
        }
        
        .lib-manager { 
            background: rgba(0,0,0,0.2); 
            border-radius: 20px; 
            padding: 16px; 
        }
        .lib-tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 16px; 
            overflow-x: auto; 
            scrollbar-width: none; 
            touch-action: pan-x;
            -webkit-overflow-scrolling: touch;
        }
        .lib-tabs::-webkit-scrollbar { 
            display: none; 
        }
        .lib-tab { 
            padding: 8px 16px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            color: rgba(255,255,255,0.7); 
            font-size: 13px; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: all 0.2s; 
            flex-shrink: 0; 
            outline: none;
            touch-action: manipulation;
        }
        .lib-tab:focus {
            border-color: #00a8ff;
            color: #00ffff;
        }
        .lib-tab.active { 
            background: rgba(0,200,255,0.2); 
            border-color: rgba(0,200,255,0.5); 
            color: #00ffff; 
        }
        
        .word-list { 
            max-height: 50vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
        
        .btn-primary { 
            padding: 14px 24px; 
            background: linear-gradient(135deg, #00a8ff, #0066ff); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: 16px;
            min-height: 50px;
            outline: none;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }
        .btn-primary:focus {
            box-shadow: 0 0 0 3px rgba(0,168,255,0.3);
        }
        .btn-primary:active:not(:disabled) { 
            transform: scale(0.98); 
        }
        .btn-primary:disabled { 
            opacity: 0.6; 
            cursor: not-allowed;
        }
        .btn-primary.loading {
            color: transparent;
        }
        .btn-primary.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .nav-btn { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            padding: 8px 16px; 
            color: rgba(255,255,255,0.5); 
            font-size: 12px; 
            background: none; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s; 
            outline: none;
            border-radius: 12px;
            touch-action: manipulation;
            min-width: 60px;
        }
        .nav-btn:focus {
            color: #00ffff;
            background: rgba(0,200,255,0.1);
        }
        .nav-btn.active { 
            color: #00ffff; 
        }
        
        .toast { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-100px); 
            padding: 12px 24px; 
            border-radius: 24px; 
            font-size: 14px; 
            z-index: 4000; 
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            backdrop-filter: blur(10px); 
            opacity: 0; 
            pointer-events: none; 
            max-width: 80%; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }
        .toast.success { 
            background: rgba(0,255,136,0.95); 
            color: #000; 
        }
        .toast.error { 
            background: rgba(255,50,50,0.95); 
            color: white; 
        }
        .toast.warning {
            background: rgba(255,200,0,0.95);
            color: #000;
        }
        
        .test-toggle { 
            position: fixed; 
            top: 80px; 
            right: 20px; 
            z-index: 1000; 
            padding: 8px 16px; 
            background: rgba(0,255,0,0.2); 
            border: 1px solid #0f0; 
            color: #0f0; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold;
            outline: none;
            touch-action: manipulation;
        }
        .test-toggle:active {
            transform: scale(0.95);
        }
        
        .input-test-result {
            margin-top: 8px;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            display: none;
        }
        .input-test-result.show {
            display: block;
        }
        .input-test-result.success {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.3);
        }
        .input-test-result.error {
            background: rgba(255,50,50,0.2);
            color: #ff6464;
            border: 1px solid rgba(255,50,50,0.3);
        }
        
        .word-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            touch-action: pan-y;
        }
        .word-item:active {
            background: rgba(255,255,255,0.1);
        }
        
        .confirm-dialog {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .confirm-dialog.active {
            display: flex;
            opacity: 1;
        }
        .confirm-box {
            background: linear-gradient(145deg, #1a3a5c, #0a1628);
            border-radius: 20px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            border: 1px solid rgba(0,200,255,0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .confirm-dialog.active .confirm-box {
            transform: scale(1);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.4);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        
        /* 修复：新增常用操作提示 */
        .operation-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,200,255,0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .operation-hint.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* 修复：加载遮罩 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 4500;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,200,255,0.3);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: #00ffff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">处理中...</div>
    </div>
    
    <!-- 操作提示 -->
    <div class="operation-hint" id="operationHint"></div>

    <!-- 图片选择浮层 -->
    <div class="picker-backdrop" id="pickerBackdrop" onclick="hideImagePicker()"></div>
    <div class="image-picker" id="imagePicker">
        <div style="width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px;"></div>
        <h3 style="margin: 0 0 16px 0; font-size: 16px; text-align: center;">选择图片</h3>
        <div class="picker-option" onclick="triggerCamera('camera')" style="display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s; touch-action: manipulation;">
            <div style="font-size: 24px; width: 40px; text-align: center;">📷</div>
            <div>
                <div style="font-weight: 500; margin-bottom: 2px;">拍照</div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5);">使用相机拍摄文字</div>
            </div>
        </div>
        <div class="picker-option" onclick="triggerCamera('album')" style="display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s; touch-action: manipulation;">
            <div style="font-size: 24px; width: 40px; text-align: center;">🖼️</div>
            <div>
                <div style="font-weight: 500; margin-bottom: 2px;">从相册选择</div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5);">选择已有图片</div>
            </div>
        </div>
        <button onclick="hideImagePicker()" style="width: 100%; padding: 14px; margin-top: 8px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; font-size: 15px; cursor: pointer; touch-action: manipulation;">取消</button>
    </div>

    <!-- OCR全屏处理弹窗 -->
    <div class="ocr-modal" id="ocrModal" onclick="if(event.target===this)closeOCRModal()">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
            <h3 style="margin: 0;">📷 图片识别</h3>
            <button onclick="closeOCRModal()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 8px; touch-action: manipulation;">&times;</button>
        </div>
        
        <div style="flex: 1; display: flex; align-items: center; justify-content: center; margin: 20px 0; border-radius: 16px; overflow: hidden; background: rgba(0,0,0,0.5); border: 2px dashed rgba(0,200,255,0.3);" id="ocrPreview">
            <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">
                <div style="font-size: 48px; margin-bottom: 12px;">🖼️</div>
                <p>正在加载...</p>
            </div>
        </div>
        
        <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 13px; color: rgba(255,255,255,0.6);" id="ocrStatus">准备识别...</span>
            <div style="display: flex; gap: 8px;">
                <button onclick="retryOCR()" id="retryBtn" style="display: none; padding: 8px 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 12px; cursor: pointer; touch-action: manipulation;">重试</button>
                <button onclick="confirmOCR()" id="confirmOCRBtn" style="display: none; padding: 8px 16px; background: linear-gradient(135deg, #00a8ff, #0066ff); border: none; border-radius: 8px; color: white; font-size: 12px; cursor: pointer; font-weight: bold; touch-action: manipulation;">使用结果</button>
            </div>
        </div>
        
        <div style="background: rgba(30,40,60,0.9); border-radius: 16px; padding: 16px; max-height: 40vh; overflow-y: auto; display: none;" id="ocrResultPanel">
            <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px;">识别到的文字（点击填入）：</div>
            <div id="ocrWordsList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            <div id="ocrFullText" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; color: rgba(255,255,255,0.7); font-family: monospace; max-height: 100px; overflow-y: auto; line-height: 1.6;"></div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="confirm-dialog" id="confirmDialog">

        // ==================== 数据管理层 ====================
        const Storage = {
            keys: {
                root: 'wm_lib_root',
                current: 'wm_current_lib',
                settings: 'wm_settings',
                stats: 'wm_stats',
                typing: 'wm_typing_stats',
                visited: 'wm_visited'
            },
            get(key, defaultVal = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultVal;
                } catch(e) { return defaultVal; }
            },
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch(e) {
                    showToast('存储失败', 'error');
                    return false;
                }
            }
        };

        let state = {
            libraryRoot: null,
            currentLibId: 'default',
            settings: { autoTranslate: true, autoPlay: false },
            currentView: 'study',
            currentWordIndex: 0,
            stats: { mastered: 0, streak: 1, lastStudy: null },
            typing: {
                targetWord: '',
                currentInput: '',
                startTime: null,
                errors: 0,
                totalChars: 0,
                cursorPos: 0
            },
            ocr: { targetInput: null, lastResult: null },
            isProcessing: false,
            confirmCallback: null
        };

        const LibraryAPI = {
            getRoot() { return Storage.get(Storage.keys.root, initDefaultData()); },
            saveRoot(root) { 
                const success = Storage.set(Storage.keys.root, root); 
                if (success) state.libraryRoot = root; 
                return success; 
            },
            findNode(id, node = null, path = []) {
                if (!node) node = this.getRoot();
                if (node.id === id) return {node, path};
                if (node.children) {
                    for (let child of node.children) {
                        const result = this.findNode(id, child, [...path, node]);
                        if (result) return result;
                    }
                }
                return null;
            },
            findLibrary(id) {
                const result = this.findNode(id);
                if (result && result.node.type === 'library') return result;
                return null;
            },
            getAllLibraries(node = null, list = [], path = '') {
                if (!node) node = this.getRoot();
                const currentPath = path ? `${path} > ${node.name}` : node.name;
                if (node.type === 'library') list.push({id: node.id, name: node.name, path: currentPath, count: node.words?.length || 0});
                if (node.children) node.children.forEach(child => this.getAllLibraries(child, list, currentPath));
                return list;
            },
            create(parentId, name, type = 'library') {
                if (!name?.trim()) throw new Error('名称不能为空');
                const trimmedName = name.trim();
                if (trimmedName.length > 50) throw new Error('名称过长');
                
                const parent = this.findNode(parentId);
                if (!parent) throw new Error('父节点不存在');
                if (!parent.node.children) parent.node.children = [];
                
                if (parent.node.children.some(c => c.name === trimmedName)) throw new Error('名称已存在');
                
                const newNode = {
                    id: `lib_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    name: trimmedName,
                    type: type,
                    created: Date.now(),
                    children: type === 'folder' ? [] : undefined,
                    words: type === 'library' ? [] : undefined
                };
                parent.node.children.push(newNode);
                this.saveRoot(state.libraryRoot);
                return newNode;
            },
            delete(id) {
                const root = this.getRoot();
                let deleted = false, deletedCurrent = false;
                
                if (id === 'root') return {success: false, deletedCurrent: false, error: '不能删除根节点'};
                if (id === 'default') return {success: false, deletedCurrent: false, error: '不能删除默认词库'};
                
                const removeFromParent = (parent, targetId) => {
                    if (!parent.children) return false;
                    const idx = parent.children.findIndex(c => c.id === targetId);
                    if (idx >= 0) {
                        const toDelete = parent.children[idx];
                        const checkCurrent = (node) => { 
                            if (node.id === state.currentLibId) return true; 
                            if (node.children) return node.children.some(checkCurrent); 
                            return false; 
                        };
                        if (checkCurrent(toDelete)) deletedCurrent = true;
                        
                        if (toDelete.words) toDelete.words = [];
                        parent.children.splice(idx, 1);
                        deleted = true;
                        return true;
                    }
                    for (let child of parent.children) if (removeFromParent(child, targetId)) return true;
                    return false;
                };
                
                removeFromParent(root, id);
                if (deleted) {
                    this.saveRoot(root);
                    if (deletedCurrent) { 
                        state.currentLibId = 'default'; 
                        Storage.set(Storage.keys.current, 'default');
                        state.currentWordIndex = 0;
                    }
                }
                return {success: deleted, deletedCurrent, error: deleted ? null : '未找到要删除的节点'};
            },
            rename(id, newName) {
                if (!newName?.trim()) throw new Error('名称不能为空');
                const trimmedName = newName.trim();
                if (trimmedName.length > 50) throw new Error('名称过长');
                
                const target = this.findNode(id);
                if (!target) throw new Error('节点不存在');
                
                const parent = target.path[target.path.length - 1] || state.libraryRoot;
                if (parent.children?.some(c => c.id !== id && c.name === trimmedName)) throw new Error('名称已存在');
                
                target.node.name = trimmedName;
                this.saveRoot(state.libraryRoot);
                return true;
            },
            addWord(libId, word, def) {
                const lib = this.findLibrary(libId);
                if (!lib) throw new Error('词库不存在');
                
                const w = word.trim().toLowerCase();
                if (!w) throw new Error('单词不能为空');
                if (w.length > 100) throw new Error('单词过长');
                
                if (lib.node.words.some(item => item.w.toLowerCase() === w)) throw new Error('单词已存在');
                
                const wordObj = { 
                    w: w, 
                    d: def?.trim() || '(未翻译)', 
                    ts: Date.now(), 
                    mastery: 0 
                };
                lib.node.words.push(wordObj);
                this.saveRoot(state.libraryRoot);
                if (state.currentLibId === libId) updateStudyView();
                return wordObj;
            },
            deleteWord(libId, wordText) {
                const lib = this.findLibrary(libId);
                if (!lib) return false;
                
                const idx = lib.node.words.findIndex(w => w.w.toLowerCase() === wordText.toLowerCase());
                if (idx >= 0) {
                    const deletedWord = lib.node.words[idx];
                    lib.node.words.splice(idx, 1);
                    this.saveRoot(state.libraryRoot);
                    
                    if (state.currentLibId === libId) {
                        const currentWord = lib.node.words[state.currentWordIndex];
                        if (!currentWord || currentWord.w === deletedWord.w) {
                            if (state.currentWordIndex >= lib.node.words.length) {
                                state.currentWordIndex = Math.max(0, lib.node.words.length - 1);
                            }
                            updateStudyView();
                        }
                    }
                    return true;
                }
                return false;
            },
            editWord(libId, oldWord, newWord, newDef) {
                const lib = this.findLibrary(libId);
                if (!lib) return false;
                
                const item = lib.node.words.find(w => w.w.toLowerCase() === oldWord.toLowerCase());
                if (!item) return false;
                
                const nw = newWord.trim().toLowerCase();
                if (!nw) throw new Error('单词不能为空');
                
                if (nw !== oldWord.toLowerCase()) {
                    const exists = lib.node.words.find(w => w.w.toLowerCase() === nw && w !== item);
                    if (exists) throw new Error('单词已存在');
                }
                
                item.w = nw;
                item.d = newDef.trim();
                item.ts = Date.now();
                this.saveRoot(state.libraryRoot);
                if (state.currentLibId === libId) updateStudyView();
                return true;
            },
            clear(libId) {
                const lib = this.findLibrary(libId);
                if (!lib) return false;
                
                const backup = [...lib.node.words];
                try {
                    lib.node.words = [];
                    this.saveRoot(state.libraryRoot);
                    if (state.currentLibId === libId) { 
                        state.currentWordIndex = 0; 
                        updateStudyView(); 
                    }
                    return true;
                } catch(e) {
                    lib.node.words = backup;
                    throw new Error('清空失败: ' + e.message);
                }
            },
            exportLib(libId) {
                const lib = this.findLibrary(libId);
                if (!lib) return null;
                return { 
                    name: lib.node.name, 
                    words: lib.node.words, 
                    exportTime: new Date().toISOString(), 
                    version: '1.0',
                    app: 'WordMaster Pro'
                };
            }
        };

        function initDefaultData() {
            return {
                id: 'root', name: '单词库', type: 'folder',
                children: [{
                    id: 'default', name: '默认词库', type: 'library',
                    words: [
                        {w: 'hello', d: '你好', ts: Date.now(), mastery: 0},
                        {w: 'world', d: '世界', ts: Date.now(), mastery: 0},
                        {w: 'study', d: '学习', ts: Date.now(), mastery: 0}
                    ],
                    created: Date.now()
                }]
            };
        }

        // ==================== 打字练习核心 ====================
        
        let typingTouchStartY = 0;
        let typingTouchStartTime = 0;
        
        function onTypingTouchStart(e) {
            typingTouchStartY = e.touches[0].clientY;
            typingTouchStartTime = Date.now();
        }
        
        function onTypingTouchEnd(e) {
            const touchEndY = e.changedTouches[0].clientY;
            const touchDuration = Date.now() - typingTouchStartTime;
            const touchDistance = Math.abs(touchEndY - typingTouchStartY);
            
            if (touchDuration < 300 && touchDistance < 10) {
                e.preventDefault();
                focusTypingInput();
            }
        }

        function initTypingPractice() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) {
                const card = document.querySelector('.practice-card');
                if (card) card.style.display = 'none';
                return;
            }
            
            const card = document.querySelector('.practice-card');
            if (card) card.style.display = 'block';
            
            const word = lib.node.words[state.currentWordIndex];
            if (!word) {
                state.currentWordIndex = 0;
                return initTypingPractice();
            }
            
            state.typing.targetWord = word.w.toLowerCase();
            state.typing.currentInput = '';
            state.typing.startTime = null;
            state.typing.errors = 0;
            state.typing.totalChars = 0;
            state.typing.cursorPos = 0;
            
            document.getElementById('practiceWord').textContent = word.w;
            document.getElementById('practiceMeaning').textContent = word.d || '(暂无释义)';
            
            const input = document.getElementById('typingInput');
            input.value = '';
            input.setAttribute('maxlength', word.w.length);
            
            renderLetterBoxes();
            updateTypingStats();
        }

        function renderLetterBoxes() {
            const container = document.getElementById('letterBoxes');
            const word = state.typing.targetWord;
            const input = state.typing.currentInput;
            
            container.innerHTML = word.split('').map((char, idx) => {
                let className = 'letter-box';
                let displayChar = '';
                
                if (idx < input.length) {
                    displayChar = input[idx];
                    className += input[idx] === char ? ' correct' : ' wrong';
                } else if (idx === input.length) {
                    className += ' pending cursor';
                }
                
                return `<div class="${className}" data-idx="${idx}">${displayChar}</div>`;
            }).join('');
        }

        function focusTypingInput() {
            const input = document.getElementById('typingInput');
            const container = document.getElementById('typingContainer');
            
            input.focus();
            input.click();
            
            if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                input.setSelectionRange(input.value.length, input.value.length);
            }
            
            container.classList.add('focused');
            
            const hint = document.getElementById('typingHint');
            hint.textContent = '⌨️ 请使用键盘输入字母';
            hint.classList.add('active');
            
            setTimeout(() => {
                container.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function onTypingFocus() {
            document.getElementById('typingContainer').classList.add('focused');
            document.body.classList.add('keyboard-open');
            const hint = document.getElementById('typingHint');
            hint.textContent = '⌨️ 正在输入...';
            hint.classList.add('active');
        }

        function onTypingBlur() {
            document.getElementById('typingContainer').classList.remove('focused');
            const hint = document.getElementById('typingHint');
            hint.textContent = '👆 点击此处输入单词字母';
            hint.classList.remove('active');
            
            setTimeout(() => {
                const active = document.activeElement;
                if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA')) {
                    document.body.classList.remove('keyboard-open');
                }
            }, 100);
        }

        function handleTyping(e) {
            const input = e.target;
            let value = input.value.toLowerCase();
            const target = state.typing.targetWord;
            
            value = value.replace(/[^a-z]/g, '');
            
            if (value.length > target.length) {
                value = value.slice(0, target.length);
            }
            
            if (input.value !== value) {
                input.value = value;
            }
            
            state.typing.currentInput = value;
            
            if (!state.typing.startTime && value.length > 0) {
                state.typing.startTime = Date.now();
            }
            
            let errors = 0;
            for (let i = 0; i < value.length; i++) {
                if (value[i] !== target[i]) errors++;
            }
            state.typing.errors = errors;
            state.typing.totalChars = value.length;
            
            renderLetterBoxes();
            updateTypingStats();
            
            if (value === target) {
                completeTyping();
            }
            
            if (navigator.vibrate && value.length > 0) {
                navigator.vibrate(3);
            }
        }

        function handleTypingKey(e) {
            if (e.key === 'Backspace') {
                if (document.activeElement.value === '') {
                    e.preventDefault();
                }
                return;
            }
            
            if (e.key === 'Tab') {
                e.preventDefault();
                nextWord();
                return;
            }
            
            if (e.key === 'Enter' && state.typing.currentInput === state.typing.targetWord) {
                e.preventDefault();
                completeTyping();
                return;
            }
        }

        function updateTypingStats() {
            const t = state.typing;
            if (!t.startTime || t.totalChars === 0) {
                updateAccuracyRing(0);
                document.getElementById('speedStat').textContent = '0 字/分';
                document.getElementById('accuracyStat').textContent = '准确率: 0%';
                document.getElementById('timeStat').textContent = '0s';
                return;
            }
            
            const elapsed = Math.max(0.1, (Date.now() - t.startTime) / 1000);
            const minutes = elapsed / 60;
            const speed = Math.round(t.totalChars / minutes);
            const accuracy = Math.max(0, Math.round((1 - (t.errors / t.totalChars)) * 100));
            
            document.getElementById('speedStat').textContent = speed + ' 字/分';
            document.getElementById('accuracyStat').textContent = '准确率: ' + accuracy + '%';
            document.getElementById('timeStat').textContent = Math.round(elapsed) + 's';
            
            updateAccuracyRing(accuracy);
        }

        function updateAccuracyRing(percent) {
            const circle = document.getElementById('accuracyCircle');
            const text = document.getElementById('accuracyText');
            const circumference = 2 * Math.PI * 26;
            
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            
            let color = '#ff6464';
            if (percent >= 80) color = '#00ff88';
            else if (percent >= 60) color = '#ffd700';
            text.style.color = color;
            text.textContent = percent + '%';
        }

        function completeTyping() {
            const time = Math.round((Date.now() - state.typing.startTime) / 1000);
            const accuracy = Math.max(0, Math.round((1 - (state.typing.errors / state.typing.totalChars)) * 100));
            
            showToast(`🎉 完成！用时${time}秒 准确率${accuracy}%`, 'success');
            
            const history = Storage.get(Storage.keys.typing, []);
            history.push({
                word: state.typing.targetWord,
                accuracy: accuracy,
                time: time,
                date: new Date().toISOString()
            });
            Storage.set(Storage.keys.typing, history.slice(-50));
            
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
            
            setTimeout(() => {
                checkWord();
                resetTyping();
            }, 1200);
        }

        function resetTyping() {
            const input = document.getElementById('typingInput');
            input.value = '';
            state.typing.currentInput = '';
            state.typing.startTime = null;
            state.typing.errors = 0;
            state.typing.totalChars = 0;
            initTypingPractice();
            
            setTimeout(() => input.focus(), 300);
        }

        // ==================== OCR功能 ====================

        function showImagePicker(target) {
            state.ocr.targetInput = target;
            
            if (document.activeElement) {
                document.activeElement.blur();
            }
            
            document.getElementById('pickerBackdrop').classList.add('active');
            document.getElementById('imagePicker').classList.add('active');
        }

        function hideImagePicker() {
            document.getElementById('pickerBackdrop').classList.remove('active');
            document.getElementById('imagePicker').classList.remove('active');
        }

        function triggerCamera(type) {
            hideImagePicker();
            const input = document.getElementById('hiddenFileInput');
            input.value = '';
            
            if (type === 'camera') {
                input.setAttribute('capture', 'environment');
            } else {
                input.removeAttribute('capture');
            }
            
            setTimeout(() => input.click(), 150);
        }

        async function handleImageSelected(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showToast('图片过大（最大10MB）', 'error');
                return;
            }
            
            const img = new Image();
            const url = URL.createObjectURL(file);
            
            img.onload = async () => {
                URL.revokeObjectURL(url);
                
                document.getElementById('ocrPreview').innerHTML = 
                    `<img src="${URL.createObjectURL(file)}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px;">`;
                document.getElementById('ocrModal').classList.add('active');
                
                await performOCR(file);
            };
            
            img.onerror = () => {
                URL.revokeObjectURL(url);
                showToast('无法读取图片', 'error');
            };
            
            img.src = url;
        }

        async function performOCR(file) {
            const statusEl = document.getElementById('ocrStatus');
            const wordsList = document.getElementById('ocrWordsList');
            const resultPanel = document.getElementById('ocrResultPanel');
            const confirmBtn = document.getElementById('confirmOCRBtn');
            const retryBtn = document.getElementById('retryBtn');
            
            statusEl.textContent = '正在识别...';
            resultPanel.style.display = 'none';
            confirmBtn.style.display = 'none';
            retryBtn.style.display = 'none';
            
            try {
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('识别超时')), 30000)
                );
                
                const ocrPromise = Tesseract.recognize(file, 'eng+chi_sim', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            statusEl.textContent = `识别中... ${Math.round(m.progress * 100)}%`;
                        }
                    }
                });
                
                const result = await Promise.race([ocrPromise, timeoutPromise]);
                
                state.ocr.lastResult = result.data;
                statusEl.textContent = `完成 (置信度: ${Math.round(result.confidence)}%)`;
                
                const text = result.data.text;
                const noiseWords = ['the', 'and', 'for', 'are', 'but', 'not', 'you', 'all', 'can', 'had', 'her', 'was', 'one', 'our', 'out'];
                
                const allEngWords = (text.match(/[a-zA-Z]{3,20}/g) || []);
                const engWords = [...new Set(allEngWords
                    .map(w => w.toLowerCase())
                    .filter(w => !noiseWords.includes(w))
                )].slice(0, 20);
                
                const chinese = [...new Set((text.match(/[\u4e00-\u9fa5]{2,}/g) || []))].slice(0, 10);
                
                wordsList.innerHTML = '';
                
                if (engWords.length > 0) {
                    const section = document.createElement('div');
                    section.style.cssText = 'width: 100%; margin-bottom: 8px; font-size: 11px; color: rgba(255,255,255,0.5);';
                    section.textContent = `英文单词 (${engWords.length}个, 点击填入):`;
                    wordsList.appendChild(section);
                    
                    engWords.forEach(word => {
                        const btn = document.createElement('button');
                        btn.style.cssText = 'padding: 6px 12px; border-radius: 20px; background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.4); color: #00ffff; font-size: 13px; cursor: pointer; margin: 0 4px 8px 0; touch-action: manipulation;';
                        btn.textContent = word;
                        btn.onclick = () => selectOCRWord(word);
                        wordsList.appendChild(btn);
                    });
                }
                
                if (chinese.length > 0) {
                    const section = document.createElement('div');
                    section.style.cssText = 'width: 100%; margin: 8px 0; font-size: 11px; color: rgba(255,255,255,0.5);';
                    section.textContent = `中文 (${chinese.length}个):`;
                    wordsList.appendChild(section);
                    
                    chinese.forEach(text => {
                        const btn = document.createElement('button');
                        btn.style.cssText = 'padding: 6px 12px; border-radius: 20px; background: rgba(255,200,0,0.2); border: 1px solid rgba(255,200,0,0.4); color: #ffd700; font-size: 13px; cursor: pointer; margin: 0 4px 8px 0; touch-action: manipulation;';
                        btn.textContent = text;
                        btn.onclick = () => selectOCRDef(text);
                        wordsList.appendChild(btn);
                    });
                }
                
                const fullTextDiv = document.getElementById('ocrFullText');
                fullTextDiv.innerHTML = `<div contenteditable="true" style="outline: none; min-height: 50px;">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                
                resultPanel.style.display = 'block';
                confirmBtn.style.display = 'inline-block';
                
                if (state.ocr.targetInput === 'auto' && engWords.length > 0) {
                    await autoAddFromOCR(engWords[0], chinese[0] || '');
                }
                
            } catch(err) {
                statusEl.textContent = '识别失败: ' + (err.message || '未知错误');
                retryBtn.style.display = 'inline-block';
                showToast('识别失败', 'error');
                console.error('OCR Error:', err);
            }
        }

        function selectOCRWord(word) {
            const target = state.ocr.targetInput;
            
            switch(target) {
                case 'word':
                case 'quickadd':
                    document.getElementById('inputWord').value = word;
                    closeOCRModal();
                    setTimeout(() => document.getElementById('inputWord').focus(), 100);
                    break;
                    
                case 'batch':
                    const textarea = document.getElementById('batchInput');
                    const currentVal = textarea.value;
                    textarea.value = currentVal + (currentVal ? '\n' : '') + word;
                    showToast(`已添加 ${word}`, 'success');
                    break;
                    
                case 'typing':
                    closeOCRModal();
                    const lib = LibraryAPI.findLibrary(state.currentLibId);
                    const exists = lib.node.words.find(w => w.w.toLowerCase() === word.toLowerCase());
                    
                    if (!exists) {
                        showConfirmDialog(`"${word}" 不在当前词库，是否添加并开始练习？`, () => {
                            try {
                                LibraryAPI.addWord(state.currentLibId, word, '');
                                const newIdx = lib.node.words.findIndex(w => w.w.toLowerCase() === word.toLowerCase());
                                if (newIdx >= 0) {
                                    state.currentWordIndex = newIdx;
                                    updateStudyView();
                                    initTypingPractice();
                                }
                                showToast(`开始练习: ${word}`, 'success');
                            } catch(e) {
                                showToast(e.message, 'error');
                            }
                        });
                    } else {
                        const idx = lib.node.words.indexOf(exists);
                        state.currentWordIndex = idx;
                        updateStudyView();
                        initTypingPractice();
                        showToast(`切换到: ${word}`, 'success');
                    }
                    break;
                    
                default:
                    document.getElementById('inputWord').value = word;
                    closeOCRModal();
            }
        }

        function selectOCRDef(text) {
            const target = state.ocr.targetInput;
            
            if (target === 'def') {
                document.getElementById('inputDef').value = text;
                closeOCRModal();
                setTimeout(() => document.getElementById('inputDef').focus(), 100);
            } else if (target === 'batch') {
                const textarea = document.getElementById('batchInput');
                const lines = textarea.value.split('\n');
                
                if (lines.length > 0 && lines[lines.length - 1].trim()) {
                    lines[lines.length - 1] += ' ' + text;
                    textarea.value = lines.join('\n');
                } else {
                    textarea.value += text;
                }
                showToast('已添加释义', 'success');
            }
        }

        async function autoAddFromOCR(word, def) {
            try {
                LibraryAPI.addWord(state.currentLibId, word, def);
                showToast(`已添加: ${word}`, 'success');
                closeOCRModal();
                updateCurrentLibDisplay();
                renderWordList();
                if (state.currentView === 'study') updateStudyView();
            } catch(e) {
                showToast(e.message, 'error');
            }
        }

        function closeOCRModal() {
            document.getElementById('ocrModal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('ocrPreview').innerHTML = `
                    <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 12px;">🖼️</div>
                        <p>准备识别...</p>
                    </div>
                `;
            }, 300);
        }

        function retryOCR() {
            const input = document.getElementById('hiddenFileInput');
            if (input.files[0]) {
                performOCR(input.files[0]);
            }
        }

        function confirmOCR() {
            closeOCRModal();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    const textarea = document.getElementById('batchInput');
                    const current = textarea.value;
                    textarea.value = current + (current ? '\n' : '') + text;
                    showToast('已粘贴', 'success');
                }
            } catch(e) {
                showToast('无法访问剪贴板，请手动粘贴', 'warning');
                document.getElementById('batchInput').focus();
            }
        }

        // ==================== 确认对话框 ====================
        
        function showConfirmDialog(message, onConfirm, title = '确认操作') {
            state.confirmCallback = onConfirm;
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmDialog').classList.add('active');
        }
        
        function cancelConfirm() {
            state.confirmCallback = null;
            document.getElementById('confirmDialog').classList.remove('active');
        }
        
        function executeConfirm() {
            document.getElementById('confirmDialog').classList.remove('active');
            if (state.confirmCallback) {
                state.confirmCallback();
                state.confirmCallback = null;
