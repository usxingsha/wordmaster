<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>WordMaster Pro - 智能单词学习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%); color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        #app { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; position: relative; padding-bottom: 100px; }
        
        .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .view { display: none; padding: 16px; padding-bottom: 120px; animation: fadeOut 0.2s; }
        .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        
        .lib-manager { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 16px; }
        .lib-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .lib-tabs::-webkit-scrollbar { display: none; }
        .lib-tab { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .lib-tab.active { background: rgba(0,200,255,0.2); border-color: rgba(0,200,255,0.5); color: #00ffff; }
        
        .word-list { max-height: 50vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .word-item { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; transition: all 0.2s; position: relative; overflow: hidden; touch-action: pan-y; }
        .word-item:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
        .word-info { flex: 1; min-width: 0; margin-right: 8px; }
        .word-title { font-weight: bold; color: #00ffff; font-size: 16px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; }
        .word-def { color: rgba(255,255,255,0.6); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .word-actions { display: flex; gap: 6px; }
        .word-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: none; background: rgba(255,255,255,0.1); color: white; transition: all 0.2s; }
        .word-btn:active { transform: scale(0.95); }
        .word-btn.delete { background: rgba(255,50,50,0.2); color: #ff6464; }
        .word-btn.edit { background: rgba(0,200,255,0.2); color: #00ffff; }
        
        .form-input { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,200,255,0.3); border-radius: 12px; color: white; font-size: 16px; -webkit-appearance: none; margin-bottom: 12px; }
        .form-input:focus { outline: none; border-color: rgba(0,200,255,0.8); }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #00a8ff, #0066ff); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: all 0.2s; margin-bottom: 10px; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .btn-secondary { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-secondary:active { background: rgba(255,255,255,0.2); }
        .btn-row { display: flex; gap: 10px; }
        .btn-row .btn-primary, .btn-row .btn-secondary { flex: 1; margin-bottom: 0; }
        
        .lib-tree-item { display: flex; align-items: center; padding: 12px; margin-bottom: 6px; border-radius: 12px; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.03); }
        .lib-tree-item:hover { background: rgba(255,255,255,0.08); }
        .lib-tree-item.active { background: rgba(0,200,255,0.15); border: 1px solid rgba(0,200,255,0.4); }
        .lib-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .lib-name { flex: 1; font-weight: 500; font-size: 15px; }
        .lib-count { font-size: 12px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 20, 35, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 100; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; color: rgba(255,255,255,0.5); font-size: 12px; background: none; border: none; cursor: pointer; transition: all 0.2s; }
        .nav-btn.active { color: #00ffff; transform: scale(1.1); }
        
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-100px); padding: 12px 24px; border-radius: 24px; font-size: 14px; z-index: 3000; transition: all 0.3s; backdrop-filter: blur(10px); opacity: 0; pointer-events: none; max-width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: rgba(0,255,136,0.95); color: #000; font-weight: 600; }
        .toast.error { background: rgba(255,50,50,0.95); color: white; }
        .toast.info { background: rgba(0,150,255,0.95); color: white; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.4); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 200; display: none; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: linear-gradient(135deg, rgba(20,40,70,0.98), rgba(10,20,40,0.99)); border: 1px solid rgba(0,200,255,0.3); border-radius: 24px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .search-box { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; font-size: 15px; margin-bottom: 12px; -webkit-appearance: none; }
        .search-box:focus { outline: none; border-color: rgba(0,200,255,0.5); }
        
        .study-card { background: rgba(0,0,0,0.2); border-radius: 24px; padding: 30px 20px; text-align: center; margin-bottom: 20px; border: 1px solid rgba(0,200,255,0.1); }
        .study-word { font-size: 36px; font-weight: bold; margin-bottom: 12px; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px rgba(0,200,255,0.5); min-height: 48px; }
        .study-def { font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 24px; min-height: 27px; }
        .study-progress { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; font-size: 14px; color: rgba(255,255,255,0.5); }
        
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .action-btn { padding: 16px; border-radius: 16px; border: none; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 14px; }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.primary { background: linear-gradient(135deg, #00a8ff, #0066ff); }
        .action-btn.success { background: linear-gradient(135deg, #00d26a, #00a854); }
        .action-btn.warning { background: linear-gradient(135deg, #ffa500, #ff7b00); }
        .action-btn.danger { background: linear-gradient(135deg, #ff4757, #cc2936); }
        .action-btn.secondary { background: rgba(255,255,255,0.1); }
        
        .spelling-slot { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 50px; background: rgba(0,0,0,0.3); border: 2px solid rgba(0,200,255,0.3); border-radius: 10px; margin: 0 4px; font-size: 20px; font-weight: bold; transition: all 0.2s; }
        .spelling-slot.filled { border-color: rgba(0,200,255,0.8); color: #00ffff; background: rgba(0,200,255,0.1); }
        .spelling-slot.correct { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.1); }
        .spelling-slot.wrong { border-color: #ff4757; color: #ff4757; animation: shake 0.4s; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00ffff; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .image-upload-area { border: 2px dashed rgba(0,200,255,0.4); border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: rgba(0,0,0,0.2); }
        .image-upload-area:active { background: rgba(0,200,255,0.1); border-color: #00ffff; transform: scale(0.98); }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 8px; font-weight: 600; }
        .badge.blue { background: rgba(0,200,255,0.2); color: #00ffff; }
        
        .confirm-dialog { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: rgba(20,30,50,0.98); border: 1px solid rgba(0,200,255,0.3); border-radius: 20px; padding: 24px; z-index: 3000; opacity: 0; pointer-events: none; transition: all 0.3s; min-width: 280px; max-width: 90%; }
        .confirm-dialog.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .confirm-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #fff; }
        .confirm-text { color: rgba(255,255,255,0.7); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .confirm-btns { display: flex; gap: 10px; }
        .confirm-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; }
        .confirm-btn.cancel { background: rgba(255,255,255,0.1); color: white; }
        .confirm-btn.ok { background: linear-gradient(135deg, #ff4757, #cc2936); color: white; }
        .confirm-btn.ok.safe { background: linear-gradient(135deg, #00a8ff, #0066ff); }
    </style>
<base target="_blank">
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <!-- 确认对话框 -->
    <div id="confirmDialog" class="confirm-dialog">
        <div class="confirm-title" id="confirmTitle">确认操作</div>
        <div class="confirm-text" id="confirmText">确定要执行此操作吗？</div>
        <div class="confirm-btns">
            <button class="confirm-btn cancel" onclick="closeConfirm()">取消</button>
            <button class="confirm-btn ok" id="confirmOkBtn" onclick="executeConfirm()">确定</button>
        </div>
    </div>

    <div id="app">
        <!-- 学习视图 -->
        <div id="studyView" class="view active">
            <div class="study-card">
                <div class="study-progress">
                    <span id="wordIndex">0</span> / <span id="totalCount">0</span>
                    <span class="badge blue" id="currentLibBadge">默认词库</span>
                </div>
                <div class="study-word" id="studyWord">Ready?</div>
                <div class="study-def" id="studyDef">点击开始学习</div>
                
                <div id="spellingArea" style="min-height: 60px; margin: 20px 0; display: flex; justify-content: center; flex-wrap: wrap;"></div>
                
                <div id="feedback" style="height: 24px; font-weight: 600; font-size: 14px; opacity: 0; transition: all 0.3s;"></div>
            </div>
            
            <div class="action-grid">
                <button class="action-btn secondary" onclick="speakCurrent()">🔊 朗读</button>
                <button class="action-btn warning" onclick="showHint()">💡 提示</button>
                <button class="action-btn success" onclick="checkAnswer()">✓ 确认</button>
                <button class="action-btn primary" onclick="nextWord()">→ 下一个</button>
            </div>
            
            <div style="text-align: center; margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 13px;">
                提示：可在词库管理中切换学习词库
            </div>
        </div>

        <!-- 词库管理视图 -->
        <div id="libraryView" class="view">
            <div class="lib-manager">
                <!-- 当前词库信息 -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <div>
                        <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 4px;">当前词库</div>
                        <div style="font-size: 18px; font-weight: bold; display: flex; align-items: center;">
                            <span id="currentLibName">默认词库</span>
                            <span class="badge blue" id="currentLibCount">0词</span>
                        </div>
                    </div>
                    <button onclick="openLibSelector()" class="btn-secondary" style="width: auto; padding: 8px 16px;">切换</button>
                </div>

                <!-- 标签页 -->
                <div class="lib-tabs">
                    <div class="lib-tab active" onclick="switchLibTab('words', this)">单词列表</div>
                    <div class="lib-tab" onclick="switchLibTab('add', this)">添加</div>
                    <div class="lib-tab" onclick="switchLibTab('batch', this)">批量</div>
                    <div class="lib-tab" onclick="switchLibTab('manage', this)">管理</div>
                </div>

                <!-- 单词列表 -->
                <div id="tab-words" class="tab-content">
                    <input type="text" class="search-box" placeholder="搜索单词..." oninput="filterWordList(this.value)">
                    <div id="wordList" class="word-list">
                        <div class="empty-state">暂无单词</div>
                    </div>
                </div>

                <!-- 添加单词 -->
                <div id="tab-add" class="tab-content" style="display: none;">
                    <input type="text" id="newWordInput" class="form-input" placeholder="英文单词（如：hello）" autocomplete="off">
                    <input type="text" id="newDefInput" class="form-input" placeholder="中文释义（可选，留空自动翻译）" autocomplete="off">
                    <div class="btn-row">
                        <button class="btn-primary" onclick="addSingleWord()" id="addBtn">添加单词</button>
                        <button class="btn-secondary" onclick="translateInput()">翻译</button>
                    </div>
                </div>

                <!-- 批量导入 -->
                <div id="tab-batch" class="tab-content" style="display: none;">
                    <textarea id="batchTextarea" class="form-input" rows="5" placeholder="每行一个单词&#10;格式：单词 释义&#10;例如：&#10;apple 苹果&#10;banana 香蕉"></textarea>
                    <button class="btn-primary" onclick="addBatchWords()">批量添加</button>
                    <button class="btn-secondary" onclick="document.getElementById('batchTextarea').value=''">清空</button>
                </div>

                <!-- 词库管理 -->
                <div id="tab-manage" class="tab-content" style="display: none;">
                    <div class="action-grid" style="grid-template-columns: 1fr; gap: 10px;">
                        <button class="action-btn primary" onclick="createLibrary()" style="flex-direction: row; justify-content: center;">➕ 新建词库</button>
                        <button class="action-btn secondary" onclick="renameLibrary()" style="flex-direction: row; justify-content: center;">✏️ 重命名</button>
                        <button class="action-btn warning" onclick="clearLibrary()" style="flex-direction: row; justify-content: center;">🗑️ 清空单词</button>
                        <button class="action-btn danger" onclick="deleteLibrary()" style="flex-direction: row; justify-content: center;">❌ 删除词库</button>
                        <button class="action-btn secondary" onclick="exportLibrary()" style="flex-direction: row; justify-content: center;">📤 导出词库</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- OCR视图 -->
        <div id="ocrView" class="view">
            <div class="glass rounded-3xl p-6">
                <h2 style="font-size: 20px; margin-bottom: 16px;">图片识别</h2>
                <div class="image-upload-area" onclick="document.getElementById('ocrFile').click()">
                    <div style="font-size: 48px; margin-bottom: 12px;">📷</div>
                    <p style="margin-bottom: 8px;">点击上传图片</p>
                    <p style="font-size: 13px; color: rgba(255,255,255,0.4);">自动识别图中的英文单词</p>
                </div>
                <input type="file" id="ocrFile" style="display: none;" accept="image/*" onchange="handleOCR(this)">
                
                <div id="ocrResultArea" style="margin-top: 20px; display: none;">
                    <div style="background: rgba(0,0,0,0.3); border-radius: 16px; padding: 16px;">
                        <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px;">识别结果（点击添加）</div>
                        <div id="ocrWordList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 词库选择器 -->
    <div id="libSelector" class="modal-overlay" onclick="closeLibSelector(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 style="margin: 0;">选择词库</h3>
                <button class="modal-close" onclick="closeLibSelector()">&times;</button>
            </div>
            <div id="libList" style="max-height: 50vh; overflow-y: auto;">
                <!-- 动态生成 -->
            </div>
            <button class="btn-primary" onclick="createLibrary()" style="margin-top: 16px; margin-bottom: 0;">+ 创建新词库</button>
        </div>
    </div>

    <!-- 编辑单词对话框 -->
    <div id="editDialog" class="modal-overlay" onclick="closeEditDialog(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 style="margin: 0;">编辑单词</h3>
                <button class="modal-close" onclick="closeEditDialog()">&times;</button>
            </div>
            <input type="hidden" id="editOldWord">
            <div style="margin-bottom: 8px; font-size: 13px; color: rgba(255,255,255,0.5);">英文单词</div>
            <input type="text" id="editWordInput" class="form-input" style="margin-bottom: 16px;">
            <div style="margin-bottom: 8px; font-size: 13px; color: rgba(255,255,255,0.5);">中文释义</div>
            <input type="text" id="editDefInput" class="form-input" style="margin-bottom: 24px;">
            <button class="btn-primary" onclick="saveEditWord()">保存修改</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchView('study')">
            <span style="font-size: 24px;">📖</span>
            <span>学习</span>
        </button>
        <button class="nav-btn" onclick="switchView('library')">
            <span style="font-size: 24px;">📚</span>
            <span>词库</span>
        </button>
        <button class="nav-btn" onclick="switchView('ocr')">
            <span style="font-size: 24px;">📷</span>
            <span>识图</span>
        </button>
    </nav>

    <script>
        // 严格模式确保代码健壮性
        'use strict';

        // 数据管理层
        const DB = {
            get(key, defaultVal = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultVal;
                } catch(e) {
                    console.error('DB get error:', e);
                    return defaultVal;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch(e) {
                    showToast('存储空间不足', 'error');
                    return false;
                }
            }
        };

        // 全局状态
        const State = {
            root: null,
            currentId: 'default',
            currentIndex: 0,
            input: [],
            confirmCallback: null,
            editingWord: null
        };

        // 初始化
        function init() {
            // 加载或初始化数据
            State.root = DB.get('wm_root', createDefaultRoot());
            State.currentId = DB.get('wm_current', 'default');
            
            // 验证当前词库存在性
            if (!findLibrary(State.currentId)) {
                State.currentId = 'default';
                DB.set('wm_current', 'default');
            }
            
            // 确保默认库存在
            if (!findLibrary('default')) {
                const defaultLib = {
                    id: 'default',
                    name: '默认词库',
                    type: 'library',
                    words: [
                        {w: 'hello', d: '你好'},
                        {w: 'world', d: '世界'},
                        {w: 'study', d: '学习'}
                    ]
                };
                State.root.children.push(defaultLib);
                saveData();
            }
            
            // 初始化视图
            updateStudyView();
            updateLibDisplay();
            renderWordList();
            
            showToast('欢迎使用 WordMaster', 'success');
        }

        function createDefaultRoot() {
            return {
                id: 'root',
                name: '词库根',
                type: 'folder',
                children: []
            };
        }

        function saveData() {
            DB.set('wm_root', State.root);
            DB.set('wm_current', State.currentId);
        }

        // 查找函数
        function findLibrary(id, node = null, path = []) {
            if (!node) node = State.root;
            if (node.id === id && node.type === 'library') return {node, path};
            if (node.children) {
                for (let child of node.children) {
                    const result = findLibrary(id, child, [...path, node]);
                    if (result) return result;
                }
            }
            return null;
        }

        function findNode(id, node = null) {
            if (!node) node = State.root;
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    const result = findNode(id, child);
                    if (result) return result;
                }
            }
            return null;
        }

        function getAllLibraries() {
            const list = [];
            function traverse(node, path = '') {
                const currentPath = path ? `${path} > ${node.name}` : node.name;
                if (node.type === 'library') {
                    list.push({id: node.id, name: node.name, count: node.words.length, path: currentPath});
                }
                if (node.children) {
                    node.children.forEach(child => traverse(child, currentPath));
                }
            }
            traverse(State.root);
            return list;
        }

        // 视图切换（修复版：确保数据同步）
        function switchView(view) {
            // 更新导航状态
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // 切换视图
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(view + 'View').classList.add('active');
            
            // 刷新数据
            if (view === 'library') {
                renderWordList();
                updateLibDisplay();
            } else if (view === 'study') {
                updateStudyView();
            }
        }

        function switchLibTab(tab, element) {
            document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            
            if (tab === 'words') renderWordList();
        }

        // 学习功能（修复索引越界问题）
        function updateStudyView() {
            const lib = findLibrary(State.currentId);
            const wordEl = document.getElementById('studyWord');
            const defEl = document.getElementById('studyDef');
            const indexEl = document.getElementById('wordIndex');
            const countEl = document.getElementById('totalCount');
            const badgeEl = document.getElementById('currentLibBadge');
            
            if (!lib || lib.node.words.length === 0) {
                wordEl.textContent = 'No Words';
                defEl.textContent = '当前词库为空，请先添加单词';
                indexEl.textContent = '0';
                countEl.textContent = '0';
                badgeEl.textContent = lib ? lib.node.name : '无词库';
                return;
            }
            
            // 修复：确保索引不越界
            if (State.currentIndex >= lib.node.words.length) {
                State.currentIndex = 0;
            }
            if (State.currentIndex < 0) State.currentIndex = 0;
            
            const word = lib.node.words[State.currentIndex];
            wordEl.textContent = word.w;
            defEl.textContent = word.d || '暂无释义';
            indexEl.textContent = State.currentIndex + 1;
            countEl.textContent = lib.node.words.length;
            badgeEl.textContent = lib.node.name;
            
            // 清空拼写区
            State.input = [];
            renderSpellingSlots(word.w.length);
        }

        function nextWord() {
            const lib = findLibrary(State.currentId);
            if (!lib || lib.node.words.length === 0) return;
            
            State.currentIndex = (State.currentIndex + 1) % lib.node.words.length;
            updateStudyView();
            hideFeedback();
        }

        function prevWord() {
            const lib = findLibrary(State.currentId);
            if (!lib || lib.node.words.length === 0) return;
            
            State.currentIndex = (State.currentIndex - 1 + lib.node.words.length) % lib.node.words.length;
            updateStudyView();
            hideFeedback();
        }

        function checkAnswer() {
            const lib = findLibrary(State.currentId);
            if (!lib || lib.node.words.length === 0) return;
            
            const word = lib.node.words[State.currentIndex];
            const feedback = document.getElementById('feedback');
            
            // 简化的检查逻辑：直接显示正确（实际应该检查输入）
            feedback.textContent = '✓ ' + word.d;
            feedback.style.color = '#00ff88';
            feedback.style.opacity = '1';
            
            setTimeout(() => {
                nextWord();
            }, 1500);
        }

        function showHint() {
            const lib = findLibrary(State.currentId);
            if (!lib || lib.node.words.length === 0) return;
            
            const word = lib.node.words[State.currentIndex];
            showToast('提示：首字母是 ' + word.w[0].toUpperCase(), 'info');
        }

        function speakCurrent() {
            const lib = findLibrary(State.currentId);
            if (!lib || lib.node.words.length === 0) return;
            
            const word = lib.node.words[State.currentIndex];
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(word.w);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
            } else {
                showToast('浏览器不支持语音', 'error');
            }
        }

        function renderSpellingSlots(count) {
            const area = document.getElementById('spellingArea');
            area.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const slot = document.createElement('div');
                slot.className = 'spelling-slot' + (State.input[i] ? ' filled' : '');
                slot.textContent = State.input[i] || '';
                area.appendChild(slot);
            }
        }

        function hideFeedback() {
            const fb = document.getElementById('feedback');
            fb.style.opacity = '0';
        }

        // 词库管理功能（修复空状态和同步问题）
        function updateLibDisplay() {
            const lib = findLibrary(State.currentId);
            if (lib) {
                document.getElementById('currentLibName').textContent = lib.node.name;
                document.getElementById('currentLibCount').textContent = lib.node.words.length + '词';
            }
        }

        function renderWordList(filter = '') {
            const list = document.getElementById('wordList');
            const lib = findLibrary(State.currentId);
            
            if (!lib || lib.node.words.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无单词<br><span style="font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 8px; display: block;">点击"添加"标签页创建</span></div>';
                return;
            }
            
            let words = lib.node.words;
            if (filter) {
                const lower = filter.toLowerCase();
                words = words.filter(w => w.w.toLowerCase().includes(lower) || w.d.includes(lower));
            }
            
            if (words.length === 0) {
                list.innerHTML = '<div class="empty-state">无匹配结果</div>';
                return;
            }
            
            // 使用字符串拼接而不是DOM操作，提高性能
            let html = '';
            words.forEach((word, idx) => {
                html += `<div class="word-item" data-word="${escapeHtml(word.w)}" data-idx="${idx}">
                    <div class="word-info">
                        <div class="word-title">${escapeHtml(word.w)}</div>
                        <div class="word-def">${escapeHtml(word.d)}</div>
                    </div>
                    <div class="word-actions">
                        <button class="word-btn edit" onclick="openEditDialog('${escapeHtml(word.w)}')">编辑</button>
                        <button class="word-btn delete" onclick="deleteWord('${escapeHtml(word.w)}')">删除</button>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function filterWordList(value) {
            renderWordList(value);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 添加单词（修复重复添加和空值问题）
        async function addSingleWord() {
            const wordInput = document.getElementById('newWordInput');
            const defInput = document.getElementById('newDefInput');
            const btn = document.getElementById('addBtn');
            
            const word = wordInput.value.trim().toLowerCase();
            const def = defInput.value.trim();
            
            if (!word) {
                showToast('请输入英文单词', 'error');
                return;
            }
            
            // 检查重复
            const lib = findLibrary(State.currentId);
            if (lib.node.words.some(w => w.w === word)) {
                showToast('该单词已存在', 'error');
                return;
            }
            
            // 自动翻译
            let finalDef = def;
            if (!finalDef) {
                btn.innerHTML = '翻译中<span class="loading"></span>';
                finalDef = await translate(word);
                btn.innerHTML = '添加单词';
                if (!finalDef) finalDef = '(未翻译)';
            }
            
            // 添加
            lib.node.words.push({
                w: word,
                d: finalDef,
                ts: Date.now()
            });
            
            saveData();
            
            // 清空输入
            wordInput.value = '';
            defInput.value = '';
            
            showToast('添加成功：' + word, 'success');
            
            // 如果在单词列表页，刷新列表
            if (document.getElementById('tab-words').style.display !== 'none') {
                renderWordList();
            }
            
            updateLibDisplay();
            
            // 如果学习视图当前为空，刷新它
            if (document.getElementById('studyWord').textContent === 'No Words') {
                updateStudyView();
            }
        }

        async function translateInput() {
            const wordInput = document.getElementById('newWordInput');
            const defInput = document.getElementById('newDefInput');
            
            const word = wordInput.value.trim();
            if (!word) {
                showToast('请先输入英文', 'error');
                return;
            }
            
            const result = await translate(word);
            if (result) {
                defInput.value = result;
                showToast('翻译完成', 'success');
            } else {
                showToast('翻译失败', 'error');
            }
        }

        async function translate(text) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh`);
                const data = await res.json();
                return data.responseData?.translatedText || '';
            } catch(e) {
                return '';
            }
        }

        async function addBatchWords() {
            const textarea = document.getElementById('batchTextarea');
            const text = textarea.value.trim();
            
            if (!text) {
                showToast('请输入内容', 'error');
                return;
            }
            
            const lines = text.split('\n');
            const lib = findLibrary(State.currentId);
            let added = 0;
            let existed = 0;
            let failed = 0;
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                const parts = line.split(/\s+/);
                const word = parts[0].toLowerCase();
                let def = parts.slice(1).join(' ');
                
                if (!word) continue;
                
                // 检查重复
                if (lib.node.words.some(w => w.w === word)) {
                    existed++;
                    continue;
                }
                
                // 如果需要自动翻译且没有释义
                if (!def && added < 5) { // 限制自动翻译数量避免被封
                    def = await translate(word) || '(未翻译)';
                    await new Promise(r => setTimeout(r, 300)); // 节流
                } else if (!def) {
                    def = '(未翻译)';
                }
                
                lib.node.words.push({
                    w: word,
                    d: def,
                    ts: Date.now()
                });
                added++;
            }
            
            saveData();
            textarea.value = '';
            
            let msg = `成功${added}个`;
            if (existed) msg += `，重复${existed}个`;
            showToast(msg, 'success');
            
            renderWordList();
            updateLibDisplay();
            updateStudyView();
        }

        function deleteWord(word) {
            showConfirm(
                '删除单词',
                `确定删除 "${word}" 吗？`,
                () => {
                    const lib = findLibrary(State.currentId);
                    const idx = lib.node.words.findIndex(w => w.w === word);
                    if (idx >= 0) {
                        lib.node.words.splice(idx, 1);
                        saveData();
                        
                        // 修复：如果删除的是当前学习的单词或之前的单词，调整索引
                        if (idx < State.currentIndex) {
                            State.currentIndex--;
                        } else if (idx === State.currentIndex) {
                            // 如果删除的是当前单词，保持索引（下一个单词会填补这个位置）
                            if (State.currentIndex >= lib.node.words.length) {
                                State.currentIndex = 0;
                            }
                        }
                        
                        renderWordList();
                        updateLibDisplay();
                        updateStudyView();
                        showToast('已删除', 'success');
                    }
                },
                'danger'
            );
        }

        function openEditDialog(word) {
            const lib = findLibrary(State.currentId);
            const w = lib.node.words.find(item => item.w === word);
            if (!w) return;
            
            document.getElementById('editOldWord').value = word;
            document.getElementById('editWordInput').value = w.w;
            document.getElementById('editDefInput').value = w.d;
            
            document.getElementById('editDialog').classList.add('active');
        }

        function saveEditWord() {
            const oldWord = document.getElementById('editOldWord').value;
            const newWord = document.getElementById('editWordInput').value.trim().toLowerCase();
            const newDef = document.getElementById('editDefInput').value.trim();
            
            if (!newWord) {
                showToast('单词不能为空', 'error');
                return;
            }
            
            const lib = findLibrary(State.currentId);
            const idx = lib.node.words.findIndex(w => w.w === oldWord);
            
            if (idx >= 0) {
                // 检查是否改名成已存在的单词
                if (newWord !== oldWord && lib.node.words.some(w => w.w === newWord)) {
                    showToast('该单词已存在', 'error');
                    return;
                }
                
                lib.node.words[idx].w = newWord;
                lib.node.words[idx].d = newDef;
                saveData();
                
                closeEditDialog();
                renderWordList();
                updateStudyView();
                showToast('修改成功', 'success');
            }
        }

        function closeEditDialog(e) {
            if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return;
            document.getElementById('editDialog').classList.remove('active');
        }

        // 词库级别操作
        function openLibSelector() {
            const list = document.getElementById('libList');
            const libs = getAllLibraries();
            
            let html = '';
            libs.forEach(lib => {
                const isActive = lib.id === State.currentId;
                html += `<div class="lib-tree-item ${isActive ? 'active' : ''}" onclick="selectLibrary('${lib.id}')" style="margin-bottom: 8px;">
                    <div class="lib-icon">${isActive ? '✓' : '📚'}</div>
                    <div class="lib-name">${escapeHtml(lib.path)}</div>
                    <div class="lib-count">${lib.count}词</div>
                </div>`;
            });
            
            list.innerHTML = html;
            document.getElementById('libSelector').classList.add('active');
        }

        function closeLibSelector(e) {
            if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return;
            document.getElementById('libSelector').classList.remove('active');
        }

        function selectLibrary(id) {
            State.currentId = id;
            State.currentIndex = 0; // 重置索引
            saveData();
            
            closeLibSelector();
            updateLibDisplay();
            renderWordList();
            updateStudyView();
            showToast('已切换词库', 'success');
        }

        function createLibrary() {
            const name = prompt('新词库名称：');
            if (!name || !name.trim()) return;
            
            // 检查重名
            const exists = getAllLibraries().some(l => l.name === name.trim());
            if (exists) {
                showToast('该名称已存在', 'error');
                return;
            }
            
            const newLib = {
                id: 'lib_' + Date.now(),
                name: name.trim(),
                type: 'library',
                words: [],
                created: Date.now()
            };
            
            State.root.children.push(newLib);
            saveData();
            
            showToast('创建成功', 'success');
            
            // 如果在选择器里，刷新选择器
            const selector = document.getElementById('libSelector');
            if (selector.classList.contains('active')) {
                openLibSelector();
            }
            
            // 询问是否切换
            if (confirm('是否切换到新词库？')) {
                selectLibrary(newLib.id);
            }
        }

        function renameLibrary() {
            const lib = findLibrary(State.currentId);
            if (!lib) return;
            
            const newName = prompt('新名称：', lib.node.name);
            if (!newName || !newName.trim() || newName === lib.node.name) return;
            
            // 检查重名（不包括自己）
            const exists = getAllLibraries().some(l => l.name === newName.trim() && l.id !== State.currentId);
            if (exists) {
                showToast('该名称已存在', 'error');
                return;
            }
            
            lib.node.name = newName.trim();
            saveData();
            updateLibDisplay();
            showToast('重命名成功', 'success');
        }

        function clearLibrary() {
            const lib = findLibrary(State.currentId);
            if (!lib || lib.node.words.length === 0) {
                showToast('词库已是空的', 'info');
                return;
            }
            
            showConfirm(
                '清空词库',
                `确定清空 "${lib.node.name}" 的 ${lib.node.words.length} 个单词吗？`,
                () => {
                    lib.node.words = [];
                    State.currentIndex = 0;
                    saveData();
                    renderWordList();
                    updateLibDisplay();
                    updateStudyView();
                    showToast('已清空', 'success');
                },
                'danger'
            );
        }

        function deleteLibrary() {
            if (State.currentId === 'default') {
                showToast('不能删除默认词库', 'error');
                return;
            }
            
            const lib = findLibrary(State.currentId);
            if (!lib) return;
            
            showConfirm(
                '删除词库',
                `确定删除 "${lib.node.name}" 吗？其中的 ${lib.node.words.length} 个单词将丢失！`,
                () => {
                    function removeFrom(parent, id) {
                        if (!parent.children) return false;
                        const idx = parent.children.findIndex(c => c.id === id);
                        if (idx >= 0) {
                            parent.children.splice(idx, 1);
                            return true;
                        }
                        for (let child of parent.children) {
                            if (removeFrom(child, id)) return true;
                        }
                        return false;
                    }
                    
                    if (removeFrom(State.root, State.currentId)) {
                        State.currentId = 'default';
                        State.currentIndex = 0;
                        saveData();
                        closeLibSelector();
                        updateLibDisplay();
                        renderWordList();
                        updateStudyView();
                        showToast('词库已删除', 'success');
                    }
                },
                'danger'
            );
        }

        function exportLibrary() {
            const lib = findLibrary(State.currentId);
            if (!lib) return;
            
            const data = {
                name: lib.node.name,
                words: lib.node.words,
                exportTime: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${lib.node.name}_导出_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('导出成功', 'success');
        }

        // OCR功能
        async function handleOCR(input) {
            const file = input.files[0];
            if (!file) return;
            
            showToast('正在识别...', 'info');
            
            try {
                const result = await Tesseract.recognize(file, 'eng', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            console.log('识别进度：', m.progress);
                        }
                    }
                });
                
                const text = result.data.text;
                const words = text
                    .replace(/[^\w\s]/g, ' ')
                    .split(/\s+/)
                    .filter(w => w.length >= 3 && w.length <= 20)
                    .filter((v, i, a) => a.indexOf(v) === i)
                    .slice(0, 10);
                
                const list = document.getElementById('ocrWordList');
                if (words.length === 0) {
                    list.innerHTML = '<span style="color: rgba(255,255,255,0.5);">未识别到有效单词</span>';
                } else {
                    list.innerHTML = words.map(w => 
                        `<button onclick="addOCRWord('${w.replace(/'/g, "\\'")}')" style="padding: 8px 16px; background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.4); color: #00ffff; border-radius: 20px; cursor: pointer; font-size: 14px;">+ ${w}</button>`
                    ).join('');
                }
                
                document.getElementById('ocrResultArea').style.display = 'block';
                showToast(`识别到 ${words.length} 个单词`, 'success');
                
            } catch(e) {
                showToast('识别失败：' + e.message, 'error');
            }
            
            input.value = ''; // 允许重复选择同一文件
        }

        async function addOCRWord(word) {
            try {
                const lib = findLibrary(State.currentId);
                if (lib.node.words.some(w => w.w === word)) {
                    showToast('该单词已存在', 'error');
                    return;
                }
                
                const def = await translate(word) || '(OCR识别)';
                lib.node.words.push({w: word, d: def, ts: Date.now()});
                saveData();
                showToast('已添加：' + word, 'success');
                updateLibDisplay();
            } catch(e) {
                showToast('添加失败', 'error');
            }
        }

        // 确认对话框系统
        function showConfirm(title, text, callback, type = 'safe') {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmText').textContent = text;
            document.getElementById('confirmDialog').classList.add('active');
            
            const okBtn = document.getElementById('confirmOkBtn');
            okBtn.className = 'confirm-btn ok ' + (type === 'danger' ? '' : 'safe');
            
            State.confirmCallback = callback;
        }

        function closeConfirm() {
            document.getElementById('confirmDialog').classList.remove('active');
            State.confirmCallback = null;
        }

        function executeConfirm() {
            if (State.confirmCallback) {
                State.confirmCallback();
                State.confirmCallback = null;
            }
            closeConfirm();
        }

        // Toast提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            
            // 强制重绘
            void toast.offsetWidth;
            
            toast.classList.add('show');
            
            // 如果有之前的定时器，清除它
            if (toast.hideTimer) clearTimeout(toast.hideTimer);
            
            toast.hideTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 启动
        init();
    </script>
</body>
</html>
