        // ==================== 核心功能函数 ====================

        function init() {
            state.libraryRoot = LibraryAPI.getRoot();
            state.currentLibId = Storage.get(Storage.keys.current, 'default');
            state.settings = Storage.get(Storage.keys.settings, {autoTranslate: true, autoPlay: false});
            state.stats = Storage.get(Storage.keys.stats, {mastered: 0, streak: 1, lastStudy: null});
            
            if (!LibraryAPI.findLibrary(state.currentLibId)) {
                state.currentLibId = 'default';
                Storage.set(Storage.keys.current, 'default');
            }
            
            bindEvents();
            updateStudyView();
            initTypingPractice();
            renderWordList();
            updateCurrentLibDisplay();
            
            const hasVisited = Storage.get(Storage.keys.visited);
            if (!hasVisited) {
                Storage.set(Storage.keys.visited, true);
                setTimeout(() => {
                    showToast('👋 欢迎使用！点击 🧪 测试功能', 'success', 5000);
                }, 1000);
            }
        }

        function bindEvents() {
            document.addEventListener('keydown', (e) => {
                if (e.key >= '0' && e.key <= '9' && !e.target.matches('input, textarea')) {
                    // 数字快捷键预留
                }
                
                if (state.currentView === 'library') {
                    if (e.key === 'Enter' && document.activeElement.id === 'inputWord') {
                        e.preventDefault();
                        if (state.settings.autoTranslate) {
                            autoTranslateAdd().then(() => addWordFromLib());
                        } else {
                            document.getElementById('inputDef').focus();
                        }
                    }
                    if (e.key === 'Enter' && document.activeElement.id === 'inputDef') {
                        e.preventDefault();
                        addWordFromLib();
                    }
                    if (e.key === 'Enter' && e.ctrlKey && document.activeElement.id === 'batchInput') {
                        e.preventDefault();
                        addBatchWords();
                    }
                }
            });

            const searchInput = document.getElementById('searchInput');
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => renderWordList(e.target.value), 150);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('#imagePicker') && 
                    !e.target.closest('.picker-backdrop') &&
                    !e.target.closest('.inline-camera-btn') &&
                    !e.target.closest('.camera-btn')) {
                    hideImagePicker();
                }
            });
            
            let lastWindowHeight = window.innerHeight;
            const visualViewport = window.visualViewport;
            
            if (visualViewport) {
                visualViewport.addEventListener('resize', () => {
                    const heightDiff = lastWindowHeight - visualViewport.height;
                    if (heightDiff > 100) {
                        document.body.classList.add('keyboard-open');
                    } else {
                        document.body.classList.remove('keyboard-open');
                    }
                    lastWindowHeight = visualViewport.height;
                });
            } else {
                window.addEventListener('resize', () => {
                    const newHeight = window.innerHeight;
                    if (newHeight < lastWindowHeight * 0.8) {
                        document.body.classList.add('keyboard-open');
                    } else {
                        document.body.classList.remove('keyboard-open');
                    }
                    lastWindowHeight = newHeight;
                });
            }
            
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });
        }

        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const view = document.getElementById(viewName + 'View');
            const btn = document.querySelector(`.nav-btn[data-view="${viewName}"]`);
            
            if (view) view.classList.add('active');
            if (btn) btn.classList.add('active');
            
            state.currentView = viewName;
            
            if (viewName === 'study') {
                updateStudyView();
                initTypingPractice();
            } else if (viewName === 'library') {
                renderWordList();
                updateCurrentLibDisplay();
                switchLibTab('words');
            }
        }

        function switchLibTab(tabName) {
            document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
            const tab = document.querySelector(`.lib-tab[data-tab="${tabName}"]`);
            if (tab) tab.classList.add('active');
            
            document.querySelectorAll('.lib-tab-content').forEach(c => c.style.display = 'none');
            const content = document.getElementById('tab-' + tabName);
            if (content) content.style.display = 'block';
            
            if (tabName === 'add') {
                setTimeout(() => document.getElementById('inputWord')?.focus(), 100);
            }
        }

        function updateStudyView() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            const wd = document.getElementById('wordDisplay');
            const dd = document.getElementById('definitionDisplay');
            const wi = document.getElementById('wordIndex');
            const tc = document.getElementById('totalCount');
            
            if (!lib?.node.words?.length) {
                wd.textContent = '📚';
                dd.textContent = '当前词库为空，去添加单词吧！';
                wi.textContent = '0';
                tc.textContent = '0';
                return;
            }
            
            if (state.currentWordIndex >= lib.node.words.length) {
                state.currentWordIndex = 0;
            }
            if (state.currentWordIndex < 0) {
                state.currentWordIndex = 0;
            }
            
            const word = lib.node.words[state.currentWordIndex];
            if (!word) {
                state.currentWordIndex = 0;
                return updateStudyView();
            }
            
            wd.textContent = word.w;
            dd.textContent = word.d || '';
            wi.textContent = (state.currentWordIndex + 1).toString();
            tc.textContent = lib.node.words.length.toString();
        }

        function nextWord() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) { 
                showToast('词库为空，请先添加单词', 'warning'); 
                return; 
            }
            
            state.currentWordIndex = (state.currentWordIndex + 1) % lib.node.words.length;
            updateStudyView();
            initTypingPractice();
            hideFeedback();
        }

        function checkWord() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) return;
            
            const word = lib.node.words[state.currentWordIndex];
            word.mastery = (word.mastery || 0) + 1;
            LibraryAPI.saveRoot(state.libraryRoot);
            showFeedback('✓ 已掌握！继续加油！', 'success');
            
            if (state.settings.autoPlay) {
                setTimeout(nextWord, 800);
            }
        }

        function showHint() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) return;
            
            const word = lib.node.words[state.currentWordIndex];
            const hints = [
                `提示：首字母 ${word.w[0].toUpperCase()}`,
                `提示：共 ${word.w.length} 个字母`,
                `提示：前两个字母 ${word.w.slice(0, 2)}`
            ];
            const randomHint = hints[Math.floor(Math.random() * hints.length)];
            showFeedback(randomHint, 'info');
        }

        function showFeedback(text, type) {
            const fb = document.getElementById('feedback');
            fb.textContent = text;
            fb.style.opacity = '1';
            fb.className = `h-8 text-center text-sm font-medium transition-opacity flex items-center justify-center ${type === 'success' ? 'text-emerald-400' : 'text-cyan-400'}`;
            clearTimeout(window.feedbackTimer);
            window.feedbackTimer = setTimeout(() => fb.style.opacity = '0', 2000);
        }

        function hideFeedback() {
            document.getElementById('feedback').style.opacity = '0';
        }

        function speakCurrent() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) return;
            
            const word = lib.node.words[state.currentWordIndex];
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(word.w);
                u.lang = 'en-US';
                u.rate = 0.8;
                window.speechSynthesis.speak(u);
            } else {
                showToast('您的设备不支持语音朗读', 'warning');
            }
        }

        function renderWordList(filterText = '') {
            const container = document.getElementById('wordListContainer');
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            
            if (!lib?.node.words?.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p>暂无单词</p>
                        <p style="font-size: 12px; margin-top: 8px;">点击"添加单词"开始积累词汇</p>
                    </div>
                `;
                return;
            }
            
            let words = [...lib.node.words];
            if (filterText) {
                const lower = filterText.toLowerCase().trim();
                words = words.filter(w => 
                    w.w?.toLowerCase().includes(lower) || 
                    w.d?.toLowerCase().includes(lower)
                );
            }
            
            words.sort((a, b) => {
                if ((a.mastery || 0) !== (b.mastery || 0)) {
                    return (a.mastery || 0) - (b.mastery || 0);
                }
                return (b.ts || 0) - (a.ts || 0);
            });
            
            if (words.length === 0 && filterText) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>没有找到匹配 "${filterText}" 的单词</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = words.map(w => `
                <div class="word-item" data-word="${w.w}">
                    <div style="flex: 1;">
                        <div style="font-weight: bold; color: #00ffff; font-size: 16px; display: flex; align-items: center; gap: 8px;">
                            ${w.w}
                            ${(w.mastery || 0) > 0 ? `<span style="font-size: 10px; background: rgba(0,255,136,0.3); color: #00ff88; padding: 2px 6px; border-radius: 8px;">掌握${w.mastery}次</span>` : ''}
                        </div>
                        <div style="color: rgba(255,255,255,0.6); font-size: 13px;">${w.d || ''}</div>
                    </div>
                    <button onclick="editWord('${w.w}')" style="padding: 6px 12px; margin-right: 8px; border-radius: 8px; background: rgba(0,200,255,0.2); border: none; color: #00ffff; font-size: 12px; cursor: pointer; touch-action: manipulation;">编辑</button>
                    <button onclick="deleteWord('${w.w}')" style="padding: 6px 12px; border-radius: 8px; background: rgba(255,50,50,0.2); border: none; color: #ff6464; font-size: 12px; cursor: pointer; touch-action: manipulation;">删除</button>
                </div>
            `).join('');
        }

        async function addWordFromLib() {
            if (state.isProcessing) return;
            
            const wi = document.getElementById('inputWord');
            const di = document.getElementById('inputDef');
            const btn = document.getElementById('addWordBtn');
            
            const word = wi.value.trim();
            const def = di.value.trim();
            
            if (!word) { 
                showToast('请输入英文单词', 'error'); 
                wi.focus(); 
                return; 
            }
            
            if (!/^[a-zA-Z\s\-'_]+$/.test(word)) {
                showToast('单词只能包含字母、空格、-、_、\'', 'error');
                return;
            }
            
            state.isProcessing = true;
            btn.disabled = true;
            btn.classList.add('loading');
            
            try {
                let finalDef = def;
                if (!finalDef && state.settings.autoTranslate) {
                    showToast('正在翻译...', 'info');
                    finalDef = await translateWord(word);
                    if (finalDef) {
                        di.value = finalDef;
                    }
                }
                
                LibraryAPI.addWord(state.currentLibId, word, finalDef || '(未翻译)');
                showToast('✓ 添加成功: ' + word, 'success');
                
                wi.value = '';
                di.value = '';
                renderWordList();
                updateCurrentLibDisplay();
                
                if (state.currentView === 'study') {
                    updateStudyView();
                }
                
                wi.focus();
                
            } catch(e) {
                showToast(e.message, 'error');
            } finally {
                state.isProcessing = false;
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        async function autoTranslateAdd() {
            const wi = document.getElementById('inputWord');
            const di = document.getElementById('inputDef');
            const word = wi.value.trim();
            
            if (!word) { 
                showToast('请先输入英文单词', 'error'); 
                return; 
            }
            
            const btn = document.getElementById('transBtn');
            btn.disabled = true;
            
            showToast('翻译中...', 'info');
            const trans = await translateWord(word);
            
            btn.disabled = false;
            
            if (trans && trans !== word) {
                di.value = trans;
                showToast('✓ 翻译完成', 'success');
                di.focus();
            } else {
                showToast('翻译失败，请手动输入', 'warning');
                di.focus();
            }
        }

        async function addBatchWords() {
            const bi = document.getElementById('batchInput');
            const btn = document.getElementById('batchAddBtn');
            const text = bi.value.trim();
            
            if (!text) { 
                showToast('请输入内容', 'error'); 
                return; 
            }
            
            btn.disabled = true;
            btn.classList.add('loading');
            
            const lines = text.split('\n').filter(l => l.trim());
            let added = 0, skipped = 0, failed = 0;
            
            for (let line of lines) {
                const parts = line.trim().split(/[\s\t]+/);
                const word = parts[0];
                const def = parts.slice(1).join(' ');
                
                if (!word) continue;
                
                try {
                    LibraryAPI.addWord(state.currentLibId, word, def || '(未翻译)');
                    added++;
                } catch(e) { 
                    if (e.message.includes('已存在')) {
                        skipped++;
                    } else {
                        failed++;
                    }
                }
            }
            
            btn.disabled = false;
            btn.classList.remove('loading');
            
            let msg = `成功${added}个`;
            if (skipped > 0) msg += `，跳过${skipped}个（已存在）`;
            if (failed > 0) msg += `，失败${failed}个`;
            
            showToast(msg, added > 0 ? 'success' : (failed > 0 ? 'error' : 'warning'));
            
            if (added > 0) {
                bi.value = '';
                renderWordList();
                updateCurrentLibDisplay();
                switchLibTab('words');
            }
        }

        async function autoTranslateBatch() {
            const textarea = document.getElementById('batchInput');
            const lines = textarea.value.trim().split('\n');
            
            if (!lines.length || !lines[0].trim()) {
                showToast('请先输入单词', 'warning');
                return;
            }
            
            const btn = document.getElementById('batchTransBtn');
            btn.disabled = true;
            
            showToast('批量翻译中...', 'info');
            
            const result = [];
            let successCount = 0;
            
            for (let line of lines) {
                const parts = line.trim().split(/[\s\t]+/);
                const word = parts[0];
                let def = parts.slice(1).join(' ');
                
                if (word && !def) {
                    const translated = await translateWord(word);
                    if (translated && translated !== word) {
                        def = translated;
                        successCount++;
                    } else {
                        def = '(翻译失败)';
                    }
                    await new Promise(r => setTimeout(r, 300));
                }
                
                result.push(`${word} ${def}`.trim());
            }
            
            textarea.value = result.join('\n');
            btn.disabled = false;
            
            showToast(`翻译完成: ${successCount}/${lines.length}`, successCount > 0 ? 'success' : 'warning');
        }

        function deleteWord(wordText) {
            showConfirmDialog(
                `确定要删除单词 "${wordText}" 吗？`,
                () => {
                    if (LibraryAPI.deleteWord(state.currentLibId, wordText)) {
                        showToast('已删除', 'success');
                        renderWordList();
                        updateCurrentLibDisplay();
                    } else {
                        showToast('删除失败', 'error');
                    }
                },
                '删除单词'
            );
        }

        function editWord(wordText) {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            const word = lib.node.words.find(w => w.w.toLowerCase() === wordText.toLowerCase());
            if (!word) {
                showToast('单词不存在', 'error');
                return;
            }
            
            const newWord = prompt('修改单词：', word.w);
            if (newWord === null) return;
            
            const newDef = prompt('修改释义：', word.d);
            if (newDef === null) return;
            
            try {
                LibraryAPI.editWord(state.currentLibId, word.w, newWord || word.w, newDef);
                showToast('修改成功', 'success');
                renderWordList();
                updateStudyView();
            } catch(e) { 
                showToast(e.message, 'error'); 
            }
        }

        function showLibSelector() {
            const sel = document.getElementById('libSelector');
            const list = document.getElementById('libTreeList');
            const libs = LibraryAPI.getAllLibraries();
            
            if (libs.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>暂无词库</p></div>';
            } else {
                list.innerHTML = libs.map(lib => `
                    <div onclick="selectLibrary('${lib.id}')" style="display: flex; align-items: center; padding: 12px; margin-bottom: 6px; border-radius: 10px; cursor: pointer; transition: all 0.2s; ${lib.id === state.currentLibId ? 'background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.4);' : 'background: rgba(255,255,255,0.05);'} touch-action: manipulation;">
                        <div style="width: 32px; text-align: center; margin-right: 12px; font-size: 18px;">${lib.id === state.currentLibId ? '✓' : '📚'}</div>
                        <div style="flex: 1; font-weight: 500; font-size: 14px;">${lib.name}</div>
                        <div style="font-size: 11px; color: rgba(255,255,255,0.5);">${lib.count}词</div>
                    </div>
                `).join('');
            }
            
            sel.classList.remove('hidden');
            setTimeout(() => {
                sel.classList.remove('opacity-0');
                const box = document.getElementById('libSelectorBox');
                box.classList.remove('scale-95');
                box.classList.add('scale-100');
            }, 10);
        }

        function hideLibSelector() {
            const sel = document.getElementById('libSelector');
            sel.classList.add('opacity-0');
            const box = document.getElementById('libSelectorBox');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => sel.classList.add('hidden'), 300);
        }

        function selectLibrary(id) {
            state.currentLibId = id;
            Storage.set(Storage.keys.current, id);
            hideLibSelector();
            updateCurrentLibDisplay();
            renderWordList();
            updateStudyView();
            initTypingPractice();
            showToast('已切换词库', 'success');
        }

        function createNewLibrary() {
            const name = prompt('新词库名称：');
            if (!name?.trim()) return;
            
            if (name.length > 50) {
                showToast('名称过长（最多50字符）', 'error');
                return;
            }
            
            try {
                const newLib = LibraryAPI.create('root', name.trim(), 'library');
                showToast('✓ 创建成功', 'success');
                
                setTimeout(() => {
                    if (confirm(`"${name}" 创建成功，是否立即切换？`)) {
                        selectLibrary(newLib.id);
                    } else {
                        hideLibSelector();
                        showLibSelector();
                    }
                }, 100);
            } catch(e) { 
                showToast(e.message, 'error'); 
            }
        }

        function renameCurrentLibrary() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib) return;
            
            if (state.currentLibId === 'default') {
                showToast('默认词库不能重命名', 'warning');
                return;
            }
            
            const name = prompt('新名称：', lib.node.name);
            if (!name?.trim()) return;
            
            try {
                LibraryAPI.rename(state.currentLibId, name.trim());
                updateCurrentLibDisplay();
                showToast('✓ 重命名成功', 'success');
            } catch(e) { 
                showToast(e.message, 'error'); 
            }
        }

        function clearCurrentLibrary() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib?.node.words?.length) { 
                showToast('词库已是空的', 'info'); 
                return; 
            }
            
            showConfirmDialog(
                `确定要清空 "${lib.node.name}" 中的 ${lib.node.words.length} 个单词吗？此操作不可恢复！`,
                () => {
                    if (LibraryAPI.clear(state.currentLibId)) {
                        showToast('已清空', 'success');
                        renderWordList();
                        updateCurrentLibDisplay();
                        updateStudyView();
                    }
                },
                '清空词库'
            );
        }

        function deleteCurrentLibrary() {
            if (state.currentLibId === 'default') { 
                showToast('不能删除默认词库', 'error'); 
                return; 
            }
            
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (!lib) return;
            
            showConfirmDialog(
                `确定要删除词库 "${lib.node.name}" 吗？其中的 ${lib.node.words.length || 0} 个单词也将被删除！`,
                () => {
                    const result = LibraryAPI.delete(state.currentLibId);
                    if (result.success) {
                        showToast('已删除', 'success');
                        if (result.deletedCurrent) {
                            selectLibrary('default');
                        }
                    } else {
                        showToast(result.error || '删除失败', 'error');
                    }
                },
                '删除词库'
            );
        }

        function exportCurrentLibrary() {
            const data = LibraryAPI.exportLib(state.currentLibId);
            if (!data) { 
                showToast('导出失败', 'error'); 
                return; 
            }
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${data.name}_export_${new Date().toISOString().slice(0,10)}.json`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            URL.revokeObjectURL(url);
            showToast('✓ 导出成功', 'success');
        }

        function updateCurrentLibDisplay() {
            const lib = LibraryAPI.findLibrary(state.currentLibId);
            if (lib?.node) {
                document.getElementById('currentLibName').textContent = lib.node.name;
                document.getElementById('currentLibCount').textContent = (lib.node.words?.length || 0) + '词';
            }
        }

        // 翻译功能
        const translationCache = new Map();
        const CACHE_MAX_SIZE = 100;
        
        async function translateWord(text) {
            if (!text || typeof text !== 'string') return '';
            
            const trimmed = text.trim().toLowerCase();
            if (!trimmed) return '';
            
            if (translationCache.has(trimmed)) {
                return translationCache.get(trimmed);
            }
            
            if (translationCache.size >= CACHE_MAX_SIZE) {
                const firstKey = translationCache.keys().next().value;
                translationCache.delete(firstKey);
            }
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const res = await fetch(
                    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(trimmed)}&langpair=en|zh`,
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                const result = data.responseData?.translatedText;
                
                if (result && 
                    result !== trimmed && 
                    !result.includes('MYMEMORY') &&
                    !result.includes('NO INTERNET')) {
                    
                    translationCache.set(trimmed, result);
                    return result;
                }
                
                return '';
                
            } catch(e) {
                console.error('Translation error:', e);
                return '';
            }
        }

        // Toast 通知
        function showToast(msg, type = 'info', duration = 3000) {
            const toast = document.getElementById('toast');
            
            clearTimeout(window.toastTimer);
            clearTimeout(window.toastHideTimer);
            
            toast.className = 'toast';
            void toast.offsetWidth;
            
            toast.textContent = msg;
            toast.classList.add(type);
            toast.classList.add('show');
            
            window.toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                
                window.toastHideTimer = setTimeout(() => {
                    toast.className = 'toast';
                }, 300);
                
            }, duration);
        }

        // 启动
        window.addEventListener('DOMContentLoaded', init);
        
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
            }
        });
        
        window.addEventListener('beforeunload', (e) => {
            const hasUnsaved = state.isProcessing || 
                              document.querySelector('.btn-primary.loading');
            
            if (hasUnsaved) {
                e.preventDefault();
                e.returnValue = '有操作正在进行中，确定要离开吗？';
            }
        });
        
        window.addEventListener('error', (e) => {
            console.error('应用错误:', e);
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.error('未处理的Promise拒绝:', e);
            e.preventDefault();
        });
    </script>
