<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WordMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .letter-slot {
            transition: all 0.2s;
            box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2);
            min-width: 40px;
            min-height: 50px;
        }
        
        .letter-slot:active { transform: scale(0.95); }
        .letter-slot.filled { 
            background: rgba(99, 102, 241, 0.2); 
            border-color: #6366f1;
            color: white;
        }
        .letter-slot.correct { 
            border-color: #10b981; 
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .letter-slot.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .symbol-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            min-width: 36px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.1s;
        }
        
        .symbol-btn:active { 
            background: rgba(99, 102, 241, 0.4); 
            transform: scale(0.95);
        }
        
        .key-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            height: 44px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }
        
        .key-btn:active { 
            background: rgba(99, 102, 241, 0.5); 
            transform: scale(0.95);
        }
        
        .key-btn.special {
            background: rgba(99, 102, 241, 0.3);
            font-size: 14px;
        }
        
        .particle {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0); }
        }
        
        ::-webkit-scrollbar { display: none; }
        
        .word-display {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        
        .input-display {
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            min-height: 30px;
        }
    </style>
</head>
<body class="pb-32">
    <div id="particles" class="fixed inset-0 pointer-events-none z-50"></div>
    
    <div class="container mx-auto px-4 py-4 max-w-md">
        <!-- 头部 -->
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xl font-bold">W</div>
                <div>
                    <h1 class="text-lg font-bold">WordMaster</h1>
                    <p class="text-xs text-slate-400">单词拼写训练</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showView('list')" class="p-2 rounded-lg glass">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <button onclick="showView('add')" class="p-2 rounded-lg bg-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
        </header>

        <!-- 统计 -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="glass rounded-2xl p-3 text-center">
                <div class="text-xl font-bold text-indigo-400" id="totalWords">0</div>
                <div class="text-[10px] text-slate-400">总单词</div>
            </div>
            <div class="glass rounded-2xl p-3 text-center">
                <div class="text-xl font-bold text-emerald-400" id="masteredWords">0</div>
                <div class="text-[10px] text-slate-400">已掌握</div>
            </div>
            <div class="glass rounded-2xl p-3 text-center">
                <div class="text-xl font-bold text-amber-400" id="currentStreak">0</div>
                <div class="text-[10px] text-slate-400">连击</div>
            </div>
        </div>

        <!-- 学习模式 -->
        <div id="studyView" class="space-y-4">
            <div class="glass rounded-3xl p-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl -mr-24 -mt-24"></div>
                
                <div class="relative z-10 text-center space-y-4">
                    <!-- 进度 -->
                    <div class="flex justify-center items-center gap-2">
                        <span class="px-3 py-1 rounded-full bg-white/5 text-xs">
                            <span id="wordIndex">1</span> / <span id="totalCount">1</span>
                        </span>
                    </div>

                    <!-- 喇叭按钮 -->
                    <button onclick="speakCurrent()" class="w-14 h-14 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center mx-auto active:scale-95 transition-transform">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                    </button>

                    <!-- 单词和释义显示 -->
                    <div class="space-y-2">
                        <div id="wordDisplay" class="text-2xl font-bold text-white word-display tracking-widest">
                            <!-- 显示当前单词（带空格） -->
                        </div>
                        <div id="definitionDisplay" class="text-sm text-slate-300">
                            <!-- 显示释义 -->
                        </div>
                    </div>

                    <!-- 输入显示（匹配手机输入法） -->
                    <div class="input-display text-lg text-indigo-300 font-mono min-h-[32px] flex items-center justify-center tracking-[0.5em]">
                        <span id="inputDisplay"></span><span class="cursor-blink">|</span>
                    </div>

                    <!-- 符号键盘 -->
                    <div class="flex flex-wrap justify-center gap-1 py-2" id="symbolKeyboard">
                        <!-- 符号按钮由JS生成 -->
                    </div>

                    <!-- 拼写区域 -->
                    <div id="spellingArea" class="flex flex-wrap justify-center gap-2 min-h-[60px] py-2"></div>

                    <!-- 控制按钮 -->
                    <div class="flex justify-center gap-3 pt-2">
                        <button onclick="showHint()" class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-sm">提示</button>
                        <button onclick="checkWord()" class="px-6 py-2 rounded-xl bg-emerald-600 text-sm font-bold">确认</button>
                        <button onclick="nextWord()" class="px-4 py-2 rounded-xl bg-indigo-600 text-sm font-bold">下一个</button>
                    </div>

                    <div id="feedback" class="h-6 text-sm font-medium opacity-0 transition-opacity"></div>
                </div>
            </div>
        </div>

        <!-- 添加模式 -->
        <div id="addView" class="hidden space-y-4">
            <div class="glass rounded-3xl p-6 space-y-4">
                <h2 class="text-xl font-bold">添加新单词</h2>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">英文单词</label>
                    <input type="text" id="newWord" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:outline-none text-white text-lg" placeholder="例如：hello">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">中文释义</label>
                    <input type="text" id="newDef" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:outline-none text-white" placeholder="例如：你好">
                </div>
                <div class="flex gap-3">
                    <button onclick="showView('study')" class="flex-1 py-3 rounded-xl bg-white/5 border border-white/10 text-sm">取消</button>
                    <button onclick="addWord()" class="flex-1 py-3 rounded-xl bg-indigo-600 text-sm font-bold">添加</button>
                </div>
                
                <div class="pt-4 border-t border-white/10">
                    <label class="block text-xs text-slate-400 mb-2">批量导入</label>
                    <textarea id="bulkWords" rows="3" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:outline-none text-sm" placeholder="apple 苹果&#10;book 书"></textarea>
                    <button onclick="addBulk()" class="mt-2 w-full py-2 rounded-xl bg-white/5 border border-white/10 text-sm">批量导入</button>
                </div>
            </div>
        </div>

        <!-- 列表模式 -->
        <div id="listView" class="hidden space-y-4">
            <div class="glass rounded-3xl p-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">单词库</h2>
                    <button onclick="clearAll()" class="text-xs text-red-400">清空</button>
                </div>
                <div id="wordList" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
                <div id="emptyState" class="hidden text-center py-8 text-slate-500 text-sm">暂无单词</div>
            </div>
        </div>
    </div>

    <!-- 底部字母键盘 -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-lg border-t border-white/10 p-2 pb-safe">
        <div class="max-w-md mx-auto space-y-1">
            <div class="grid grid-cols-10 gap-1">
                <button class="key-btn" onclick="typeKey('q')">Q</button>
                <button class="key-btn" onclick="typeKey('w')">W</button>
                <button class="key-btn" onclick="typeKey('e')">E</button>
                <button class="key-btn" onclick="typeKey('r')">R</button>
                <button class="key-btn" onclick="typeKey('t')">T</button>
                <button class="key-btn" onclick="typeKey('y')">Y</button>
                <button class="key-btn" onclick="typeKey('u')">U</button>
                <button class="key-btn" onclick="typeKey('i')">I</button>
                <button class="key-btn" onclick="typeKey('o')">O</button>
                <button class="key-btn" onclick="typeKey('p')">P</button>
            </div>
            <div class="grid grid-cols-10 gap-1 px-4">
                <button class="key-btn" onclick="typeKey('a')">A</button>
                <button class="key-btn" onclick="typeKey('s')">S</button>
                <button class="key-btn" onclick="typeKey('d')">D</button>
                <button class="key-btn" onclick="typeKey('f')">F</button>
                <button class="key-btn" onclick="typeKey('g')">G</button>
                <button class="key-btn" onclick="typeKey('h')">H</button>
                <button class="key-btn" onclick="typeKey('j')">J</button>
                <button class="key-btn" onclick="typeKey('k')">K</button>
                <button class="key-btn" onclick="typeKey('l')">L</button>
                <button class="key-btn special" onclick="backspace()">⌫</button>
            </div>
            <div class="grid grid-cols-9 gap-1 px-8">
                <button class="key-btn" onclick="typeKey('z')">Z</button>
                <button class="key-btn" onclick="typeKey('x')">X</button>
                <button class="key-btn" onclick="typeKey('c')">C</button>
                <button class="key-btn" onclick="typeKey('v')">V</button>
                <button class="key-btn" onclick="typeKey('b')">B</button>
                <button class="key-btn" onclick="typeKey('n')">N</button>
                <button class="key-btn" onclick="typeKey('m')">M</button>
                <button class="key-btn special col-span-2" onclick="checkWord()">Enter</button>
            </div>
        </div>
    </div>

    <script>
        // 符号库
        const symbols = ['-', "'", '.', ',', '!', '?', '(', ')', '[', ']', '{', '}', '@', '#', '$', '%', '&', '*', '+', '=', '/', '\\', '|', '<', '>', ':', ';', '"', '`', '~', '^', '_'];
        
        let words = JSON.parse(localStorage.getItem('wm_words')) || [
            {w:"hello", d:"你好，打招呼"},
            {w:"world", d:"世界"},
            {w:"study", d:"学习"}
        ];
        let currentIdx = 0;
        let currentInput = [];
        let streak = 0;
        let mastered = new Set(JSON.parse(localStorage.getItem('wm_mastered') || '[]'));

        function init() {
            updateStats();
            renderSymbols();
            if(words.length) loadWord(0);
            else showEmpty();
        }

        function renderSymbols() {
            const container = document.getElementById('symbolKeyboard');
            container.innerHTML = symbols.map(s => 
                `<button class="symbol-btn" onclick="typeSymbol('${s}')">${s}</button>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('totalWords').textContent = words.length;
            document.getElementById('masteredWords').textContent = mastered.size;
            document.getElementById('currentStreak').textContent = streak;
        }

        function showView(view) {
            document.getElementById('studyView').classList.add('hidden');
            document.getElementById('addView').classList.add('hidden');
            document.getElementById('listView').classList.add('hidden');
            document.getElementById(view + 'View').classList.remove('hidden');
            if(view === 'list') renderList();
        }

        function loadWord(idx) {
            currentIdx = idx % words.length;
            const word = words[currentIdx];
            currentInput = [];
            
            // 显示单词（带空格，便于阅读）
            document.getElementById('wordDisplay').textContent = word.w.split('').join(' ');
            document.getElementById('definitionDisplay').textContent = word.d;
            document.getElementById('wordIndex').textContent = currentIdx + 1;
            document.getElementById('totalCount').textContent = words.length;
            
            updateInputDisplay();
            renderSlots(word.w.length);
            
            setTimeout(() => speak(word.w), 300);
        }

        function updateInputDisplay() {
            // 显示已输入的字符，用空格分隔，匹配手机输入法样式
            const display = currentInput.join(' ') || '';
            document.getElementById('inputDisplay').textContent = display;
        }

        function renderSlots(count) {
            const area = document.getElementById('spellingArea');
            area.innerHTML = '';
            for(let i = 0; i < count; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot w-10 h-12 rounded-lg border-2 border-white/20 flex items-center justify-center text-xl font-bold';
                slot.textContent = currentInput[i] || '';
                if(currentInput[i]) slot.classList.add('filled');
                area.appendChild(slot);
            }
        }

        function typeKey(k) {
            const word = words[currentIdx].w;
            if(currentInput.length < word.length) {
                currentInput.push(k);
                updateInputDisplay();
                renderSlots(word.length);
                if(navigator.vibrate) navigator.vibrate(10);
            }
        }

        function typeSymbol(s) {
            const word = words[currentIdx].w;
            if(currentInput.length < word.length) {
                currentInput.push(s);
                updateInputDisplay();
                renderSlots(word.length);
                if(navigator.vibrate) navigator.vibrate(10);
            }
        }

        function backspace() {
            if(currentInput.length > 0) {
                currentInput.pop();
                updateInputDisplay();
                renderSlots(words[currentIdx].w.length);
                if(navigator.vibrate) navigator.vibrate(10);
            }
        }

        function checkWord() {
            const word = words[currentIdx].w;
            const input = currentInput.join('');
            const fb = document.getElementById('feedback');
            
            if(input === word) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function handleSuccess() {
            const word = words[currentIdx].w;
            document.querySelectorAll('.letter-slot').forEach(s => s.classList.add('correct'));
            
            mastered.add(word);
            localStorage.setItem('wm_mastered', JSON.stringify([...mastered]));
            streak++;
            updateStats();
            
            const fb = document.getElementById('feedback');
            fb.textContent = '✨ 正确！+' + Math.min(streak * 10, 50) + '分';
            fb.className = 'h-6 text-sm font-medium text-emerald-400';
            fb.style.opacity = '1';
            
            createParticles();
            if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
            
            setTimeout(() => {
                fb.style.opacity = '0';
                nextWord();
            }, 1500);
        }

        function handleError() {
            const word = words[currentIdx].w;
            document.querySelectorAll('.letter-slot').forEach((s, i) => {
                if(currentInput[i] !== word[i]) s.classList.add('wrong');
            });
            
            streak = 0;
            updateStats();
            
            const fb = document.getElementById('feedback');
            fb.textContent = '❌ 错误，请重试';
            fb.className = 'h-6 text-sm font-medium text-red-400';
            fb.style.opacity = '1';
            
            if(navigator.vibrate) navigator.vibrate(200);
            
            setTimeout(() => {
                fb.style.opacity = '0';
                currentInput = [];
                updateInputDisplay();
                renderSlots(word.length);
            }, 1200);
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#6366f1', '#10b981', '#f59e0b'];
            for(let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle w-3 h-3 rounded-full';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 200) + 'px';
                p.style.top = (window.innerHeight / 2) + 'px';
                p.style.animationDelay = Math.random() * 0.3 + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function speak(text) {
            if('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.rate = 0.8;
                window.speechSynthesis.speak(u);
            }
        }

        function speakCurrent() {
            if(words[currentIdx]) speak(words[currentIdx].w);
        }

        function showHint() {
            if(words[currentIdx] && currentInput.length === 0) {
                const word = words[currentIdx].w;
                currentInput.push(word[0]);
                updateInputDisplay();
                renderSlots(word.length);
            }
        }

        function nextWord() {
            let next;
            do { next = Math.floor(Math.random() * words.length); }
            while(next === currentIdx && words.length > 1);
            loadWord(next);
        }

        function addWord() {
            const w = document.getElementById('newWord').value.trim();
            const d = document.getElementById('newDef').value.trim();
            if(w && d) {
                words.push({w, d});
                localStorage.setItem('wm_words', JSON.stringify(words));
                document.getElementById('newWord').value = '';
                document.getElementById('newDef').value = '';
                updateStats();
                showView('study');
                loadWord(words.length - 1);
            }
        }

        function addBulk() {
            const lines = document.getElementById('bulkWords').value.trim().split('\n');
            let added = 0;
            lines.forEach(line => {
                const parts = line.trim().split(/\s+/);
                if(parts.length >= 2) {
                    words.push({w: parts[0], d: parts.slice(1).join(' ')});
                    added++;
                }
            });
            if(added > 0) {
                localStorage.setItem('wm_words', JSON.stringify(words));
                document.getElementById('bulkWords').value = '';
                updateStats();
                alert(`添加 ${added} 个单词`);
                showView('study');
            }
        }

        function renderList() {
            const list = document.getElementById('wordList');
            const empty = document.getElementById('emptyState');
            if(words.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            list.innerHTML = words.map((item, i) => `
                <div class="flex justify-between items-center p-3 rounded-xl bg-white/5">
                    <div>
                        <div class="font-bold ${mastered.has(item.w) ? 'text-emerald-400' : 'text-white'}">
                            ${item.w} ${mastered.has(item.w) ? '✓' : ''}
                        </div>
                        <div class="text-xs text-slate-400">${item.d}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadWord(${i}); showView('study')" class="px-3 py-1 rounded bg-indigo-500/20 text-indigo-400 text-xs">练习</button>
                        <button onclick="deleteWord(${i})" class="px-3 py-1 rounded bg-red-500/20 text-red-400 text-xs">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteWord(i) {
            if(confirm('删除？')) {
                mastered.delete(words[i].w);
                words.splice(i, 1);
                localStorage.setItem('wm_words', JSON.stringify(words));
                localStorage.setItem('wm_mastered', JSON.stringify([...mastered]));
                renderList();
                updateStats();
            }
        }

        function clearAll() {
            if(confirm('清空所有？')) {
                words = [];
                mastered.clear();
                localStorage.removeItem('wm_words');
                localStorage.removeItem('wm_mastered');
                renderList();
                updateStats();
                showEmpty();
            }
        }

        function showEmpty() {
            document.getElementById('wordDisplay').textContent = '';
            document.getElementById('definitionDisplay').textContent = '请先添加单词';
            document.getElementById('spellingArea').innerHTML = '';
            document.getElementById('inputDisplay').textContent = '';
        }

        // 物理键盘支持
        document.addEventListener('keydown', e => {
            if(document.getElementById('studyView').classList.contains('hidden')) return;
            
            if(e.key.length === 1) {
                e.preventDefault();
                if(/[a-zA-Z]/.test(e.key)) typeKey(e.key.toLowerCase());
                else if(symbols.includes(e.key)) typeSymbol(e.key);
            }
            if(e.key === 'Backspace') {
                e.preventDefault();
                backspace();
            }
            if(e.key === 'Enter') {
                e.preventDefault();
                checkWord();
            }
        });

        init();
    </script>
</body>
</html>
